<style>
  :root{
    --ink:#1E1B4B;
    --paper:#FAF8F4;
    --coral:#FF6B5B;
    --sage:#7C9885;
    --amber:#F4A259;
    --sky:#5B8DEF;
    --line:#E8E4DC;
    --card:#FFFFFF;
  }
  *{font-family:'Inter',sans-serif;}
  .font-display{font-family:'Space Grotesk',sans-serif;}
  .font-mono{font-family:'JetBrains Mono',monospace;}
  body{background:var(--paper);transition:background-color 0.2s ease;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:#D8D2C5;border-radius:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  .glass{background:rgba(255,255,255,0.65);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.5);}
  .glass-dark{background:rgba(30,27,75,0.55);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08);}
  @keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(124,152,133,0.5);}70%{box-shadow:0 0 0 8px rgba(124,152,133,0);}100%{box-shadow:0 0 0 0 rgba(124,152,133,0);}}
  .pulse{animation:pulse-ring 2s infinite;}
  @keyframes float-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .float-in{animation:float-in 0.4s ease-out both;}
  @keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
  .shimmer{background:linear-gradient(90deg,#FF6B5B,#F4A259,#FF6B5B);background-size:200% auto;animation:shimmer 3s linear infinite;-webkit-background-clip:text;background-clip:text;color:transparent;}
  .scrollbar-none::-webkit-scrollbar{display:none;}
  .scrollbar-none{-ms-overflow-style:none;scrollbar-width:none;}

  /* ============ DARK MODE ============ */
  html.dark{ --ink:#F4F2FF; --paper:#13112E; --line:#2E2A5C; --card:#211D4F; }
  html.dark body{ background:var(--paper); }

  /* Glass panels / cards */
  html.dark .glass{ background:rgba(33,29,79,0.65); border:1px solid rgba(255,255,255,0.06); }

  /* White surfaces -> dark card surfaces */
  html.dark .bg-white{ background-color:var(--card) !important; }
  html.dark .bg-white\/90{ background-color:rgba(33,29,79,0.9) !important; }
  html.dark .hover\:bg-white\/90:hover{ background-color:rgba(33,29,79,0.9) !important; }

  /* Primary ink text -> light text */
  html.dark [class*="text-[#1E1B4B]"]{ color:var(--ink) !important; }
  html.dark [class*="bg-[#1E1B4B]"]{ background-color:var(--card) !important; }
  html.dark [class*="border-[#1E1B4B]"]{ border-color:var(--line) !important; }

  /* Lines / borders driven by CSS var already adapt via --line override above */
  html.dark [class*="border-[var(--line)]"]{ border-color:var(--line) !important; }

  /* Subtle hover/bg tints based on ink color */
  html.dark [class*="hover:bg-[#1E1B4B]"]:hover{ background-color:rgba(244,242,255,0.08) !important; }
  html.dark [class*="bg-[#1E1B4B]/5"]{ background-color:rgba(244,242,255,0.06) !important; }
  html.dark [class*="bg-[#1E1B4B]/10"]{ background-color:rgba(244,242,255,0.1) !important; }

  /* Inputs and selects */
  html.dark input, html.dark select, html.dark textarea{ background-color:rgba(255,255,255,0.04); color:var(--ink); }
  html.dark input::placeholder, html.dark textarea::placeholder{ color:rgba(244,242,255,0.3); }

  /* Sidebar already dark by default (bg-[#1E1B4B]); keep readable in light mode too */

  /* Scrollbar in dark */
  html.dark ::-webkit-scrollbar-thumb{ background:#3A3570; }

  /* ── Dark mode: muted ink text → light ── */
  html.dark .text-\[\#1E1B4B\]\/20{ color:rgba(244,242,255,0.2) !important; }
  html.dark .text-\[\#1E1B4B\]\/30{ color:rgba(244,242,255,0.3) !important; }
  html.dark .text-\[\#1E1B4B\]\/40{ color:rgba(244,242,255,0.4) !important; }
  html.dark .text-\[\#1E1B4B\]\/50{ color:rgba(244,242,255,0.5) !important; }
  html.dark .text-\[\#1E1B4B\]\/60{ color:rgba(244,242,255,0.6) !important; }
  html.dark .text-\[\#1E1B4B\]\/70{ color:rgba(244,242,255,0.7) !important; }
  html.dark .text-\[\#1E1B4B\]\/80{ color:rgba(244,242,255,0.8) !important; }
  html.dark .text-\[\#1E1B4B\]\/90{ color:rgba(244,242,255,0.9) !important; }
  html.dark .text-\[\#1E1B4B\]   { color:var(--ink) !important; }

  /* ── Dark mode: ink-tinted backgrounds → dark-friendly ── */
  html.dark .bg-\[\#1E1B4B\]\/5  { background-color:rgba(244,242,255,0.04) !important; }
  html.dark .bg-\[\#1E1B4B\]\/10 { background-color:rgba(244,242,255,0.07) !important; }
  html.dark .bg-\[\#1E1B4B\]\/15 { background-color:rgba(244,242,255,0.10) !important; }

  /* ── Dark mode: white overlays ── */
  html.dark .bg-white\/40  { background-color:rgba(255,255,255,0.03) !important; }
  html.dark .bg-white\/50  { background-color:rgba(255,255,255,0.04) !important; }
  html.dark .bg-white\/60  { background-color:rgba(255,255,255,0.05) !important; }
  html.dark .hover\:bg-white\/60:hover { background-color:rgba(255,255,255,0.06) !important; }
  html.dark .hover\:bg-white\/80:hover { background-color:rgba(255,255,255,0.07) !important; }
  html.dark .hover\:bg-white:hover     { background-color:rgba(255,255,255,0.07) !important; }

  /* ── Dashboard icon container borders in dark (user request) ── */
  html.dark .dashboard-page .w-10.h-10,
  html.dark .dashboard-page .w-9.h-9,
  html.dark .dashboard-page .w-8.h-8,
  html.dark .dashboard-page .w-7.h-7 {
    border: 1px solid rgba(255,255,255,0.15);
  }
</style>
<script>
  // Apply saved theme class to <html> before paint to avoid flash
  (function(){
    try {
      var saved = localStorage.getItem('pathway-theme');
      if (saved === 'dark') document.documentElement.classList.add('dark');
    } catch(e) {}
  })();
</script>

// Decode a JWT credential returned by Google Identity Services (no verification —
// this is fine for client-side display, but a real backend should verify the token).
function decodeJwt(token) {
  try {
    const payload = token.split('.')[1];
    const json = decodeURIComponent(atob(payload.replace(/-/g,'+').replace(/_/g,'/')).split('').map(c =>

    ).join(''));
    return JSON.parse(json);

function Assignments() {
  const [openSubject, setOpenSubject] = useState(null);
  const [checked,     setChecked]     = useState({});
  const [detailItem,  setDetailItem]  = useState(null);   // assignment currently shown in modal
  const [attachments, setAttachments] = useState({});      // { [assignmentId]: { name, size } }
  const fileInputRef = useRef(null);

  const toggleSubject = (id) => setOpenSubject(prev => prev === id ? null : id);
  const toggleCheck   = (aId, e) => { e.stopPropagation(); setChecked(prev => ({ ...prev, [aId]: !prev[aId] })); };
  const openDetails   = (a, e) => { if (e) e.stopPropagation(); setDetailItem(a); };

  const handleFileChosen = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file || !detailItem) return;
    const sizeKB = file.size / 1024;
    const sizeLabel = sizeKB > 1024 ? `${(sizeKB/1024).toFixed(1)} MB` : `${Math.max(1,Math.round(sizeKB))} KB`;
    setAttachments(prev => ({ ...prev, [detailItem.id]: { name: file.name, size: sizeLabel } }));
    e.target.value = "";
  };

  const removeAttachment = (aId) => setAttachments(prev => { const next = { ...prev }; delete next[aId]; return next; });

  const doneFor   = (sid) => (ASSIGNMENTS_DATA[sid]||[]).filter(a => checked[a.id]).length;
  const totalAll  = Object.values(ASSIGNMENTS_DATA).flat().length;
  const doneAll   = Object.values(checked).filter(Boolean).length;

  return (
    <div className="space-y-4 max-w-3xl mx-auto">
      {/* Hidden file input shared by all "Attach" buttons */}
      <input ref={fileInputRef} type="file" accept=".pdf,.doc,.docx,.txt,image/*" className="hidden" onChange={handleFileChosen} />

      {/* Overall counter */}
      <div className="flex items-center justify-between mb-2">
        <p className="text-sm text-[#1E1B4B]/50">Click a subject to view & check off assignments</p>
        <span className="text-xs font-medium px-3 py-1.5 rounded-full bg-[#1E1B4B]/5 text-[#1E1B4B]/60 flex items-center gap-1.5">
          <I name="check-circle" size={13}/> {doneAll} / {totalAll} done
        </span>
      </div>

      {SUBJECTS_NEW.map((subj, idx) => {
        const isOpen = openSubject === subj.id;
        const items  = ASSIGNMENTS_DATA[subj.id] || [];
        const done   = doneFor(subj.id);
        const pct    = Math.round((done / items.length) * 100);

        return (
          <div key={subj.id} className="rounded-2xl overflow-hidden float-in"
            style={{ animationDelay:`${idx*70}ms`, boxShadow:"0 2px 12px rgba(30,27,75,0.07)", border:`1.5px solid ${subj.color}28` }}>

            {/* ─── Subject header card ─── */}

              style={{ background: isOpen ? `${subj.color}10` : "rgba(255,255,255,0.75)" }}>
              <div className="flex items-center gap-4 px-5 py-4">

                {/* Icon bubble */}
                <div className="w-12 h-12 rounded-xl flex items-center justify-center shrink-0"
                  style={{ background:`${subj.color}20`, color:subj.color, boxShadow:`0 2px 8px ${subj.color}30` }}>
                  <I name={subj.icon} size={22}/>
                </div>

                {/* Name + progress */}
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                    <span className="text-[10px] font-bold px-2 py-0.5 rounded-full tracking-widest"
                      style={{ background:`${subj.color}20`, color:subj.color }}>
                      {subj.short}
                    </span>
                    <h3 className="font-display font-semibold text-[#1E1B4B] text-[15px] leading-tight">{subj.name}</h3>
                  </div>
                  <div className="flex items-center gap-2">
                    <div className="flex-1 h-2 rounded-full overflow-hidden" style={{ background:`${subj.color}18` }}>
                      <div className="h-full rounded-full transition-all duration-700"
                        style={{ width:`${pct}%`, background:subj.color }}/>
                    </div>
                    <span className="text-[11px] font-medium shrink-0" style={{ color:`${subj.color}CC` }}>
                      {done}/{items.length} done
                    </span>
                  </div>
                </div>

                {/* Animated chevron */}
                <div className="w-8 h-8 rounded-full flex items-center justify-center shrink-0 transition-all duration-300"
                  style={{ background:`${subj.color}15`, color:subj.color, transform: isOpen ? "rotate(180deg)" : "rotate(0deg)" }}>

                    <polyline points="6 9 12 15 18 9"/>
                  </svg>
                </div>
              </div>
            </button>

            {/* ─── Assignment list (shown when open) ─── */}
            {isOpen && (
              <div className="float-in" style={{ borderTop:`1.5px solid ${subj.color}20`, background:"rgba(255,255,255,0.6)" }}>
                {items.map((a, i) => {
                  const isDone  = !!checked[a.id];
                  const days    = daysUntil(a.due);
                  const overdue = days < 0 && !isDone;
                  const urgent  = days <= 1 && !isDone;
                  const att     = attachments[a.id];
                  return (
                    <div key={a.id}
                      className="flex items-start gap-4 px-5 py-4 transition-colors hover:bg-white/70"
                      style={{
                        borderBottom: i < items.length - 1 ? `1px solid ${subj.color}14` : "none",
                        background: isDone ? `${subj.color}07` : "transparent",

                      {/* Checkbox */}
                      <button onClick={(e) => toggleCheck(a.id, e)} className="mt-0.5 shrink-0 w-5 h-5 rounded-md border-2 flex items-center justify-center transition-all duration-200"
                        style={{ borderColor: isDone ? subj.color : "#1E1B4B25", background: isDone ? subj.color : "white", boxShadow: isDone ? `0 0 0 3px ${subj.color}20` : "none" }}>
                        {isDone && (
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round">
                            <polyline points="20 6 9 17 4 12"/>

                      </button>

                      {/* Text */}
                      <div className="flex-1 min-w-0 cursor-pointer" onClick={(e) => toggleCheck(a.id, e)}>
                        <div className="flex items-center gap-2 mb-0.5 flex-wrap">
                          <span className="text-[10px] font-semibold px-2 py-0.5 rounded-full"
                            style={{ background:`${subj.color}18`, color:subj.color }}>
                            {a.label}
                          </span>
                          {!isDone && (
                            <span className="text-[10px] font-semibold px-2 py-0.5 rounded-full flex items-center gap-1"
                              style={{ background: overdue ? "#FF6B5B22" : urgent ? "#FF6B5B18" : `${subj.color}10`, color: overdue || urgent ? "#FF6B5B" : `${subj.color}99` }}>
                              <I name="alarm-clock" size={10}/>
                              {overdue ? "Overdue" : days === 0 ? "Due today" : days === 1 ? "Due tomorrow" : `${days}d left`}

                          {att && (
                            <span className="text-[10px] font-semibold px-2 py-0.5 rounded-full flex items-center gap-1 bg-[#7C9885]/15 text-[#7C9885]">

                          <I name="calendar" size={11}/> Due {fmtDate(a.due)}, 2026
                        </p>
                      </div>

                      {/* Details button */}
                      <button onClick={(e) => openDetails(a, e)}
                        className="shrink-0 mt-0.5 text-[11px] font-semibold px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition-colors"
                        style={{ background:`${subj.color}15`, color:subj.color }}>
                        <I name="eye" size={12}/> Details
                      </button>
                    </div>
                  );

                  style={{ background:`${subj.color}08`, borderTop:`1px solid ${subj.color}15` }}>
                  <span className="text-xs text-[#1E1B4B]/40">

                  <span className="text-xs font-semibold" style={{ color:subj.color }}>{pct}% complete</span>
                </div>
              </div>
            )}
          </div>
        );
      })}

      {/* ─── Assignment Details Modal ─── */}
      {detailItem && (() => {
        const subjId  = Object.keys(ASSIGNMENTS_DATA).find(sid => ASSIGNMENTS_DATA[sid].some(a => a.id === detailItem.id));
        const subj    = SUBJECTS_NEW.find(s => s.id === subjId) || SUBJECTS_NEW[0];
        const days    = daysUntil(detailItem.due);
        const overdue = days < 0;
        const isDone  = !!checked[detailItem.id];
        const att     = attachments[detailItem.id];
        return (
          <div className="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setDetailItem(null)}>
            <div className="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl max-h-[88vh] overflow-y-auto float-in" onClick={e => e.stopPropagation()}>

              {/* Header */}
              <div className="flex items-start justify-between mb-4">
                <div>
                  <div className="flex items-center gap-2 mb-2">
                    <span className="text-[10px] font-bold px-2 py-0.5 rounded-full tracking-widest" style={{ background:`${subj.color}20`, color:subj.color }}>{subj.short}</span>
                    <span className="text-[10px] font-semibold px-2 py-0.5 rounded-full" style={{ background:`${subj.color}18`, color:subj.color }}>{detailItem.label}</span>

                  <h2 className="font-display text-lg font-semibold text-[#1E1B4B]">{detailItem.title}</h2>

                    <I name="calendar" size={13}/> {fmtDate(detailItem.due)}
                  </p>
                  <p className={`text-[11px] mt-0.5 ${overdue && !isDone ? "text-[#FF6B5B]" : "text-[#1E1B4B]/40"}`}>
                    {isDone ? "Completed" : overdue ? "Overdue" : days === 0 ? "Due today" : days === 1 ? "Due tomorrow" : `${days} days left`}

                </div>
                <div className="rounded-xl p-3" style={{ background:`${subj.color}0A` }}>
                  <p className="text-[10px] text-[#1E1B4B]/40 mb-1 uppercase tracking-wide">Priority</p>

                    {isDone ? "Completed" : "Pending"}

                </div>

              <div className="mb-4">

// ---------- CALENDAR ----------
function CalendarModule() {
  const [view, setView] = useState("month");
  const [selectedEvent, setSelectedEvent] = useState(null);

  const events = [
    ...ASSIGNMENTS.map(a => ({ date: a.due, title: a.title, type: "assignment", color: "#FF6B5B", subject: subjectById(a.subject).name })),
    ...CAS.map(c => ({ date: c.date, title: `${c.name} — ${subjectById(c.subject).name}`, type: "ca", color: "#F4A259", subject: subjectById(c.subject).name, time: c.time, venue: c.venue })),
    { date: "2026-06-15", title: "Mid-Term Exam — Engineering Physics", type: "exam", color: "#5B8DEF", subject: "Engineering Physics" },
    { date: "2026-06-13", title: "Group Study — Differential Equations", type: "study", color: "#7C9885", subject: "Engineering Mathematics" },
    { date: "2026-06-17", title: "Group Study — Pointers Practice", type: "study", color: "#7C9885", subject: "Programming in C" },
  ];

  // June 2026 calendar grid (June 1, 2026 is a Monday)
  const daysInMonth = 30;
  const startOffset = 1; // June 1 2026 = Monday (index 1 if Sun=0)
  const cells = [];
  for (let i=0;i<startOffset;i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);

  const eventsForDay = (d) => events.filter(e => new Date(e.date).getDate() === d && new Date(e.date).getMonth() === 5);

  return (
    <div>
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div className="flex items-center gap-2">
          {["Day","Week","Month","Year"].map(v => (
            <button key={v} onClick={() => setView(v.toLowerCase())}
              className={`px-4 py-2 rounded-xl text-sm font-medium transition-all ${view===v.toLowerCase() ? "bg-[#1E1B4B] text-white" : "bg-white text-[#1E1B4B]/60 hover:bg-[#1E1B4B]/5"}`}>
              {v}
            </button>
          ))}
        </div>
        <div className="flex items-center gap-3">
          <button className="w-9 h-9 rounded-lg bg-white flex items-center justify-center text-[#1E1B4B]/50 hover:bg-[#1E1B4B]/5"><I name="chevron-left" size={16}/></button>
          <span className="font-display font-semibold text-[#1E1B4B]">June 2026</span>
          <button className="w-9 h-9 rounded-lg bg-white flex items-center justify-center text-[#1E1B4B]/50 hover:bg-[#1E1B4B]/5"><I name="chevron-right" size={16}/></button>
        </div>
      </div>

      {/* Legend */}
      <div className="flex flex-wrap gap-4 mb-4 text-xs text-[#1E1B4B]/60">
        {[["Assignment Deadlines","#FF6B5B"],["CAs","#F4A259"],["Exams","#5B8DEF"],["Study Tasks","#7C9885"]].map(([l,c])=>(
          <span key={l} className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{background:c}}></span>{l}</span>
        ))}
      </div>

      {view === "month" && (
        <div className="glass rounded-2xl p-4 shadow-sm">
          <div className="grid grid-cols-7 gap-2 mb-2">
            {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => (
              <div key={d} className="text-center text-xs font-semibold text-[#1E1B4B]/40 py-2">{d}</div>
            ))}
          </div>
          <div className="grid grid-cols-7 gap-2">
            {cells.map((d, i) => {
              const dayEvents = d ? eventsForDay(d) : [];
              const isToday = d === 11;
              return (
                <div key={i} className={`min-h-[90px] rounded-xl p-1.5 ${d ? "bg-white/50 hover:bg-white/80" : ""} transition-colors ${isToday ? "ring-2 ring-[#FF6B5B]" : ""}`}>
                  {d && <p className={`text-xs font-medium mb-1 ${isToday ? "text-[#FF6B5B]" : "text-[#1E1B4B]/50"}`}>{d}</p>}
                  <div className="space-y-1">
                    {dayEvents.slice(0,2).map((e,idx) => (
                      <div key={idx} onClick={() => setSelectedEvent(e)} className="text-[10px] px-1.5 py-0.5 rounded truncate cursor-pointer text-white font-medium" style={{background:e.color}}>
                        {e.title}
                      </div>
                    ))}
                    {dayEvents.length > 2 && <p className="text-[10px] text-[#1E1B4B]/30 px-1.5">+{dayEvents.length-2} more</p>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {view !== "month" && (
        <div className="glass rounded-2xl p-8 shadow-sm text-center">
          <I name="calendar-range" size={36} className="text-[#1E1B4B]/20 mx-auto mb-3"/>
          <p className="text-sm text-[#1E1B4B]/50">{view.charAt(0).toUpperCase()+view.slice(1)} view — showing same events in a {view} layout.</p>
          <div className="mt-4 space-y-2 max-w-md mx-auto text-left">
            {events.slice(0,5).map((e,i) => (
              <div key={i} onClick={() => setSelectedEvent(e)} className="flex items-center gap-3 p-2.5 bg-white/60 rounded-xl cursor-pointer hover:bg-white">
                <span className="w-2 h-2 rounded-full" style={{background:e.color}}></span>
                <span className="text-sm text-[#1E1B4B]/70 flex-1 truncate">{e.title}</span>
                <span className="text-xs text-[#1E1B4B]/40">{fmtDate(e.date)}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {selectedEvent && (
        <div className="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setSelectedEvent(null)}>
          <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl" onClick={e=>e.stopPropagation()}>
            <div className="w-10 h-10 rounded-xl flex items-center justify-center mb-3" style={{background:`${selectedEvent.color}1A`, color:selectedEvent.color}}>
              <I name={selectedEvent.type==='assignment'?'clipboard-list':selectedEvent.type==='ca'?'file-check-2':selectedEvent.type==='exam'?'graduation-cap':'users'} size={18}/>
            </div>
            <h3 className="font-display font-semibold text-[#1E1B4B] mb-1">{selectedEvent.title}</h3>
            <p className="text-sm text-[#1E1B4B]/50 mb-3">{selectedEvent.subject}</p>
            <div className="text-sm text-[#1E1B4B]/60 space-y-1">
              <p className="flex items-center gap-2"><I name="calendar" size={14}/> {fmtDate(selectedEvent.date)}, 2026</p>
              {selectedEvent.time && <p className="flex items-center gap-2"><I name="clock" size={14}/> {selectedEvent.time}</p>}
              {selectedEvent.venue && <p className="flex items-center gap-2"><I name="map-pin" size={14}/> {selectedEvent.venue}</p>}
            </div>
            <button onClick={() => setSelectedEvent(null)} className="mt-4 w-full py-2.5 rounded-xl bg-[#1E1B4B] text-white text-sm font-medium">Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

function CommunityChat({ room, setRoom }) {
  const [messages, setMessages] = useState(COMMUNITY_MESSAGES);
  const [input, setInput] = useState("");
  const [typing, setTyping] = useState(true);
  const scrollRef = useRef(null);

  const rooms = [
    { id: "general", label: "Global Community", icon: "globe-2" },
    ...SUBJECTS.map(s => ({ id: s.id, label: s.name, icon: s.icon, color: s.color })),
  ];

  const roomMessages = messages.filter(m => m.room === room || (room !== "general" && m.room === "general" && false));

  useEffect(() => {
    scrollRef.current?.scrollTo({ top: scrollRef.current.scrollHeight, behavior: "smooth" });
  }, [messages, room]);

  const send = () => {
    if (!input.trim()) return;
    setMessages([...messages, { id: Date.now(), user: { name: "You", avatar: "ME", color: "#1E1B4B" }, text: input, time: "now", room }]);
    setInput("");

  const currentRoom = rooms.find(r => r.id === room);

              <span className="truncate flex-1 text-left">{r.label}</span>
            </button>
          ))}
        </div>
        <div className="p-3 border-t border-[var(--line)]">
          <p className="text-xs font-semibold text-[#1E1B4B]/40 uppercase tracking-wide px-2 mb-2">Online Now</p>

            <div>
              <p className="font-medium text-[#1E1B4B] text-sm">{currentRoom.label}</p>

          ))}
          {typing && (
            <div className="flex items-center gap-2 text-xs text-[#1E1B4B]/40 pl-11">

  const [googleProfile, setGoogleProfile] = useState(null); // { name, email, picture, sub }
  const [authError, setAuthError] = useState("");
  const [form, setForm] = useState({ name: "", year: "2nd Year", semester: "3", branch: "Computer Science", className: "" });
  const buttonRef = useRef(null);

  // Initialize Google Identity Services once the script has loaded
  useEffect(() => {
    let cancelled = false;

    const handleCredentialResponse = (response) => {
      const payload = decodeJwt(response.credential);
      if (!payload) {
        setAuthError("Couldn't read your Google profile. Please try again.");
        return;
      }
      setAuthError("");
      setGoogleProfile({
        name: payload.name || "",
        email: payload.email || "",
        picture: payload.picture || "",
        sub: payload.sub || "",
      });
      // Prefill the profile form with the name Google gave us
      setForm(f => ({ ...f, name: payload.name || f.name }));
      setStep("profile");
    };

    const init = () => {
      if (cancelled) return;
      if (!window.google || !window.google.accounts || !window.google.accounts.id) {
        // Google script not ready yet — retry shortly
        setTimeout(init, 200);
        return;
      }
      try {
        window.google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: handleCredentialResponse,
          auto_select: false,
        });
        if (buttonRef.current) {
          window.google.accounts.id.renderButton(buttonRef.current, {
            type: "standard",
            theme: "filled_white",
            size: "large",
            shape: "pill",
            text: "continue_with",
            logo_alignment: "left",
            width: 320,
          });
        }
      } catch (e) {
        console.error("Google Identity Services init failed:", e);
        setAuthError("Google Sign-In couldn't load. Check your Client ID and authorized origins.");
      }
    };

    init();
    return () => { cancelled = true; };
  }, []);

  const handleSubmitProfile = () => {
    if (!form.name.trim() || !form.semester || !form.className.trim()) return;
    onLogin({
      name: form.name,
      email: googleProfile ? googleProfile.email : "",
      picture: googleProfile ? googleProfile.picture : "",
      year: form.year,
      semester: form.semester,
      branch: form.branch,
      className: form.className,
    });
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden" style={{background:"linear-gradient(135deg,#1E1B4B 0%,#2d2870 50%,#1E1B4B 100%)"}}>
      <div className="absolute top-[-10%] left-[-10%] w-96 h-96 rounded-full bg-[#FF6B5B]/20 blur-3xl"></div>
      <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 rounded-full bg-[#5B8DEF]/20 blur-3xl"></div>

      <div className="relative glass-dark rounded-3xl p-8 max-w-md w-full text-white shadow-2xl float-in">
        <div className="text-center mb-8">
          <div className="w-14 h-14 mx-auto rounded-2xl bg-gradient-to-br from-[#FF6B5B] to-[#F4A259] flex items-center justify-center font-display font-bold text-2xl mb-4">P</div>
          <h1 className="font-display text-2xl font-semibold">Pathway</h1>
          <p className="text-sm text-white/50 mt-1">Your academic journey, organized.</p>
        </div>

        {step === "login" && (
          <div>
            {/* Google renders its own button into this container */}
            <div className="flex justify-center" ref={buttonRef}></div>

            {/* Fallback message if the Google script hasn't initialized */}
            {!window.google && (
              <p className="text-center text-xs text-white/30 mt-3">Loading Google Sign-In…</p>
            )}

            {authError && (
              <p className="text-center text-xs text-[#FF6B5B] mt-3">{authError}</p>
            )}

            <p className="text-center text-xs text-white/30 mt-6">By continuing, you agree to Pathway's Terms & Privacy Policy.</p>
          </div>
        )}

        {step === "profile" && (
          <div className="space-y-3 float-in">
            {googleProfile && (
              <div className="flex items-center gap-3 mb-2 p-3 rounded-xl bg-white/5 border border-white/10">
                {googleProfile.picture ? (
                  <img src={googleProfile.picture} alt="" className="w-10 h-10 rounded-full object-cover" referrerPolicy="no-referrer" />
                ) : (
                  <div className="w-10 h-10 rounded-full bg-[#5B8DEF] flex items-center justify-center font-semibold text-sm">
                    {(googleProfile.name || "?").slice(0,1).toUpperCase()}
                  </div>
                )}
                <div className="overflow-hidden">
                  <p className="text-sm font-medium truncate">{googleProfile.name}</p>
                  <p className="text-xs text-white/40 truncate">{googleProfile.email}</p>
                </div>
              </div>
            )}
            <p className="text-sm text-white/60 mb-4">Welcome! Let's set up your profile.</p>
            <div>
              <label className="text-xs text-white/40 mb-1 block">Full Name</label>
              <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50 placeholder:text-white/30"/>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-white/40 mb-1 block">Academic Year</label>
                <select value={form.year} onChange={e=>setForm({...form,year:e.target.value})} className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50">
                  <option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option>
                </select>
              </div>
              <div>
                <label className="text-xs text-white/40 mb-1 block">Semester</label>
                <select value={form.semester} onChange={e=>setForm({...form,semester:e.target.value})} className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50">
                  {[1,2,3,4,5,6,7,8].map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-white/40 mb-1 block">Branch / Department</label>
                <input value={form.branch} onChange={e=>setForm({...form,branch:e.target.value})} className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50"/>
              </div>
              <div>
                <label className="text-xs text-white/40 mb-1 block">Class</label>
                <input value={form.className} onChange={e=>setForm({...form,className:e.target.value})} placeholder="e.g. A / B / C" className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50 placeholder:text-white/30"/>
              </div>
            </div>
            <button onClick={handleSubmitProfile} disabled={!form.name.trim() || !form.className.trim()} className="w-full bg-[#FF6B5B] text-white rounded-xl py-3 font-medium hover:bg-[#ff5a48] transition-colors mt-2 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
              Get Started
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ---------- APP ROOT ----------
const PAGE_META = {
  dashboard: { title: "Dashboard", subtitle: "Welcome back! Here's your academic overview." },
  assignments: { title: "Assignments", subtitle: "Track and manage your coursework." },
  cas: { title: "Cumulative Assessments", subtitle: "Stay on top of upcoming CAs." },
  pyqs: { title: "Previous Year Questions", subtitle: "Browse and download past papers." },
  material: { title: "Study Material", subtitle: "Books, videos, and resources by subject." },
  calendar: { title: "Academic Calendar", subtitle: "All your deadlines and events in one place." },
  community: { title: "", subtitle: "" },
  notifications: { title: "Notifications", subtitle: "Stay updated with reminders and activity." },
  settings: { title: "Settings", subtitle: "Manage your profile and preferences." },
};

function App() {
  const [user, setUser] = useState({
    name: "Aditi Sharma",
    avatar: "AS",
    email: "aditi.sharma@college.edu",
    picture: "",
    branch: "Computer Science",
    className: "A",
    semester: "3",
    year: "2nd Year",
  });
  const [page, setPage] = useState("dashboard");
  const [collapsed, setCollapsed] = useState(false);
  const [search, setSearch] = useState("");
  const [theme, setTheme] = useState(() => {
    try {
      return document.documentElement.classList.contains('dark') ? 'dark' : (localStorage.getItem('pathway-theme') || 'light');
    } catch (e) { return 'light'; }
  });

  // Apply theme class to <html> and persist
  useEffect(() => {
    const root = document.documentElement;
    if (theme === 'dark') {
      root.classList.add('dark');
    } else {
      root.classList.remove('dark');
    }
    try { localStorage.setItem('pathway-theme', theme); } catch (e) {}
  }, [theme]);

  const meta = PAGE_META[page];
  const isCommunity = page === "community";

  return (
    <div className="min-h-screen flex">
      <Sidebar page={page} setPage={setPage} collapsed={collapsed} setCollapsed={setCollapsed} user={user} />
      <main className={`flex-1 transition-all duration-300 ${collapsed ? "ml-20" : "ml-64"} p-4 md:p-8`}>
        {!isCommunity && <Topbar title={meta.title} subtitle={meta.subtitle} search={search} setSearch={setSearch} user={user} />}
        {isCommunity && (
          <div className="flex justify-end mb-2">
            <div className="w-10 h-10 rounded-full bg-gradient-to-br from-[#5B8DEF] to-[#9B6BFF] flex items-center justify-center font-display font-semibold text-white text-sm shrink-0">{user.avatar}</div>
          </div>
        )}

        {page === "dashboard" && <Dashboard setPage={setPage} />}
        {page === "assignments" && <Assignments />}
        {page === "cas" && <CAModule />}
        {page === "pyqs" && <PYQModule />}
        {page === "material" && <StudyMaterial />}
        {page === "calendar" && <CalendarModule />}
        {page === "community" && <HelpEachOther />}
        {page === "notifications" && <NotificationsModule />}
        {page === "settings" && <SettingsModule user={user} setUser={setUser} theme={theme} setTheme={setTheme} />}
      </main>
    </div>
  );
}

// ---------- ERROR BOUNDARY ----------
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("Render error:", error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding: 24, fontFamily: 'monospace', whiteSpace: 'pre-wrap', color: '#FF6B5B', background:'#1E1B4B', minHeight:'100vh'}}>
          <h2>Something went wrong</h2>
          <p>{String(this.state.error && this.state.error.message)}</p>
          <pre>{String(this.state.error && this.state.error.stack)}</pre>
        </div>
      );
    }
    return this.props.children;
  }
}

window.addEventListener('error', (e) => {
  console.error('Global error:', e.error || e.message, e.filename, e.lineno, e.colno);
});

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
