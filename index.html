const GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com";

// Decode a JWT credential returned by Google Identity Services (no verification —
// this is fine for client-side display, but a real backend should verify the token).
function decodeJwt(token) {
  try {
    const payload = token.split('.')[1];
    const json = decodeURIComponent(atob(payload.replace(/-/g,'+').replace(/_/g,'/')).split('').map(c =>
      '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));
    return JSON.parse(json);
  } catch (e) {
    console.error("Failed to decode JWT:", e);
    return null;
  }
}

function CalendarModule() {
  const [view, setView] = useState("month");
  const [selectedEvent, setSelectedEvent] = useState(null);

  const events = [
    ...ASSIGNMENTS.map(a => ({ date: a.due, title: a.title, type: "assignment", color: "#FF6B5B", subject: subjectById(a.subject).name })),
    ...CAS.map(c => ({ date: c.date, title: `${c.name} — ${subjectById(c.subject).name}`, type: "ca", color: "#F4A259", subject: subjectById(c.subject).name, time: c.time, venue: c.venue })),
    { date: "2026-06-15", title: "Mid-Term Exam — Engineering Physics", type: "exam", color: "#5B8DEF", subject: "Engineering Physics" },
    { date: "2026-06-13", title: "Group Study — Differential Equations", type: "study", color: "#7C9885", subject: "Engineering Mathematics" },
    { date: "2026-06-17", title: "Group Study — Pointers Practice", type: "study", color: "#7C9885", subject: "Programming in C" },
  ];

  // June 2026 calendar grid (June 1, 2026 is a Monday)
  const daysInMonth = 30;
  const startOffset = 1; // June 1 2026 = Monday (index 1 if Sun=0)
  const cells = [];
  for (let i=0;i<startOffset;i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);

  const eventsForDay = (d) => events.filter(e => new Date(e.date).getDate() === d && new Date(e.date).getMonth() === 5);

  return (
    <div>
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div className="flex items-center gap-2">
          {["Day","Week","Month","Year"].map(v => (
            <button key={v} onClick={() => setView(v.toLowerCase())}
              className={`px-4 py-2 rounded-xl text-sm font-medium transition-all ${view===v.toLowerCase() ? "bg-[#1E1B4B] text-white" : "bg-white text-[#1E1B4B]/60 hover:bg-[#1E1B4B]/5"}`}>
              {v}
            </button>
          ))}

function CommunityChat({ room, setRoom }) {
  const [messages, setMessages] = useState(COMMUNITY_MESSAGES);
  const [input, setInput] = useState("");
  const [typing, setTyping] = useState(true);
  const scrollRef = useRef(null);

  const rooms = [
    { id: "general", label: "Global Community", icon: "globe-2" },
    ...SUBJECTS.map(s => ({ id: s.id, label: s.name, icon: s.icon, color: s.color })),
  ];

  const roomMessages = messages.filter(m => m.room === room || (room !== "general" && m.room === "general" && false));

  useEffect(() => {
    scrollRef.current?.scrollTo({ top: scrollRef.current.scrollHeight, behavior: "smooth" });
  }, [messages, room]);

  const send = () => {
    if (!input.trim()) return;
    setMessages([...messages, { id: Date.now(), user: { name: "You", avatar: "ME", color: "#1E1B4B" }, text: input, time: "now", room }]);
    setInput("");
  };

  const currentRoom = rooms.find(r => r.id === room);

  return (
    <div className="flex h-[calc(100vh-220px)] min-h-[480px] glass rounded-2xl overflow-hidden shadow-sm">
      {/* Room list */}
      <div className="w-56 shrink-0 border-r border-[var(--line)] bg-white/40 flex flex-col">
        <div className="p-3 border-b border-[var(--line)]">
          <p className="text-xs font-semibold text-[#1E1B4B]/40 uppercase tracking-wide px-2">Discussion Rooms</p>
        </div>
        <div className="flex-1 overflow-y-auto scrollbar-none p-2 space-y-1">
          {rooms.map(r => (
            <button key={r.id} onClick={() => setRoom(r.id)}
              className={`w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm transition-colors ${room===r.id ? "bg-[#1E1B4B] text-white" : "text-[#1E1B4B]/60 hover:bg-white/80"}`}>
              <I name={r.icon} size={15} />
              <span className="truncate flex-1 text-left">{r.label}</span>
            </button>
          ))}
        </div>
        <div className="p-3 border-t border-[var(--line)]">
          <p className="text-xs font-semibold text-[#1E1B4B]/40 uppercase tracking-wide px-2 mb-2">Online Now</p>
          <div className="space-y-1.5 px-1">
            {ONLINE_STUDENTS.map(s => (
              <div key={s.id} className="flex items-center gap-2">
                <div className="relative">
                  <div className="w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-semibold text-white" style={{background:s.color}}>{s.avatar}</div>
                  <span className={`absolute -bottom-0.5 -right-0.5 w-2 h-2 rounded-full border border-white ${s.status==='online'?'bg-[#7C9885]':'bg-[#1E1B4B]/20'}`}></span>
                </div>
                <span className="text-xs text-[#1E1B4B]/60 truncate">{s.name.split(' ')[0]}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Chat */}
      <div className="flex-1 flex flex-col min-w-0">
        <div className="p-4 border-b border-[var(--line)] flex items-center justify-between bg-white/40">
          <div className="flex items-center gap-2">
            <I name={currentRoom.icon} size={18} style={currentRoom.color ? {color: currentRoom.color} : {}}/>
            <div>
              <p className="font-medium text-[#1E1B4B] text-sm">{currentRoom.label}</p>
              <p className="text-xs text-[#1E1B4B]/40">{ONLINE_STUDENTS.filter(s=>s.status==='online').length} online</p>
            </div>
          </div>
          <I name="search" size={16} className="text-[#1E1B4B]/30"/>
        </div>

        <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-4">
          {roomMessages.length === 0 && (
            <div className="text-center text-sm text-[#1E1B4B]/30 mt-10">No messages yet in this room. Say hi! 👋</div>
          )}
          {roomMessages.map((m,i) => (
            <div key={m.id} className={`flex gap-3 float-in ${m.user.name==='You' ? "flex-row-reverse" : ""}`} style={{animationDelay:`${i*30}ms`}}>
              <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold text-white shrink-0" style={{background:m.user.color}}>{m.user.avatar}</div>
              <div className={`max-w-[75%] ${m.user.name==='You' ? "items-end" : ""} flex flex-col`}>
                <div className={`flex items-center gap-2 mb-1 ${m.user.name==='You' ? "flex-row-reverse" : ""}`}>
                  <span className="text-xs font-medium text-[#1E1B4B]">{m.user.name}</span>
                  <span className="text-[10px] text-[#1E1B4B]/30">{m.time}</span>
                </div>
                <div className={`rounded-2xl px-3.5 py-2.5 text-sm ${m.user.name==='You' ? "bg-[#FF6B5B] text-white rounded-tr-sm" : "bg-white text-[#1E1B4B]/80 rounded-tl-sm"} shadow-sm`}>
                  {m.text.split(' ').map((w,wi) => w.startsWith('@') ? <span key={wi} className={`font-medium ${m.user.name==='You'?'text-white':'text-[#5B8DEF]'}`}>{w} </span> : w + ' ')}

                      <p className="text-xs font-medium text-[#1E1B4B] truncate">{m.attachment.name}</p>
                      <p className="text-[10px] text-[#1E1B4B]/40">{m.attachment.size}</p>
                    </div>
                  </div>
                )}
                {m.link && (
                  <div className="mt-1.5 bg-white rounded-xl overflow-hidden shadow-sm border border-[var(--line)] max-w-xs">
                    <div className="h-20 bg-[#1E1B4B] flex items-center justify-center"><I name="play-circle" size={24} className="text-white/70"/></div>
                    <div className="p-2"><p className="text-xs font-medium text-[#1E1B4B] truncate">{m.link.title}</p><p className="text-[10px] text-[#1E1B4B]/40">{m.link.url}</p></div>
                  </div>
                )}
                <div className={`flex gap-1 mt-1 ${m.user.name==='You' ? "flex-row-reverse" : ""}`}>
                  {["👍","❤️","😄"].map(e => <span key={e} className="text-xs bg-white/80 rounded-full px-1.5 py-0.5 cursor-pointer hover:scale-110 transition-transform shadow-sm">{e}</span>)}
                </div>
              </div>
            </div>
          ))}
          {typing && (
            <div className="flex items-center gap-2 text-xs text-[#1E1B4B]/40 pl-11">
              <div className="flex gap-0.5">
                <span className="w-1.5 h-1.5 rounded-full bg-[#1E1B4B]/30 animate-bounce" style={{animationDelay:'0ms'}}></span>
                <span className="w-1.5 h-1.5 rounded-full bg-[#1E1B4B]/30 animate-bounce" style={{animationDelay:'150ms'}}></span>
                <span className="w-1.5 h-1.5 rounded-full bg-[#1E1B4B]/30 animate-bounce" style={{animationDelay:'300ms'}}></span>
              </div>
              Rohan Das is typing...
            </div>
          )}
        </div>

        <div className="p-3 border-t border-[var(--line)] bg-white/40">
          <div className="flex items-center gap-2">
            <button className="w-9 h-9 rounded-xl flex items-center justify-center text-[#1E1B4B]/40 hover:bg-white transition-colors shrink-0"><I name="paperclip" size={17}/></button>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}
              placeholder={`Message ${currentRoom.label}... use @ to mention`}
              className="flex-1 px-4 py-2.5 rounded-xl border border-[var(--line)] bg-white text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30" />
            <button className="w-9 h-9 rounded-xl flex items-center justify-center text-[#1E1B4B]/40 hover:bg-white transition-colors shrink-0"><I name="smile" size={17}/></button>
            <button onClick={send} className="w-9 h-9 rounded-xl flex items-center justify-center bg-[#FF6B5B] text-white hover:bg-[#ff5a48] transition-colors shrink-0"><I name="send" size={15}/></button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------- LOGIN ----------
function Login({ onLogin }) {
  const [step, setStep] = useState("login");
  const [googleProfile, setGoogleProfile] = useState(null); // { name, email, picture, sub }
  const [authError, setAuthError] = useState("");
  const [form, setForm] = useState({ name: "", year: "2nd Year", semester: "3", branch: "Computer Science", className: "" });
  const buttonRef = useRef(null);

  // Initialize Google Identity Services once the script has loaded
  useEffect(() => {
    let cancelled = false;

    const handleCredentialResponse = (response) => {
      const payload = decodeJwt(response.credential);
      if (!payload) {
        setAuthError("Couldn't read your Google profile. Please try again.");
        return;
      }
      setAuthError("");
      setGoogleProfile({
        name: payload.name || "",
        email: payload.email || "",
        picture: payload.picture || "",
        sub: payload.sub || "",
      });
      // Prefill the profile form with the name Google gave us
      setForm(f => ({ ...f, name: payload.name || f.name }));
      setStep("profile");
    };

    const init = () => {
      if (cancelled) return;
      if (!window.google || !window.google.accounts || !window.google.accounts.id) {
        // Google script not ready yet — retry shortly
        setTimeout(init, 200);
        return;
      }
      try {
        window.google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: handleCredentialResponse,
          auto_select: false,
        });
        if (buttonRef.current) {
          window.google.accounts.id.renderButton(buttonRef.current, {
            type: "standard",
            theme: "filled_white",
            size: "large",
            shape: "pill",
            text: "continue_with",
            logo_alignment: "left",
            width: 320,
          });
        }
      } catch (e) {
        console.error("Google Identity Services init failed:", e);
        setAuthError("Google Sign-In couldn't load. Check your Client ID and authorized origins.");
      }
    };

    init();
    return () => { cancelled = true; };
  }, []);

  const handleSubmitProfile = () => {
    if (!form.name.trim() || !form.semester || !form.className.trim()) return;
    onLogin({
      name: form.name,
      email: googleProfile ? googleProfile.email : "",
      picture: googleProfile ? googleProfile.picture : "",
      year: form.year,
      semester: form.semester,
      branch: form.branch,
      className: form.className,
    });
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden" style={{background:"linear-gradient(135deg,#1E1B4B 0%,#2d2870 50%,#1E1B4B 100%)"}}>
      <div className="absolute top-[-10%] left-[-10%] w-96 h-96 rounded-full bg-[#FF6B5B]/20 blur-3xl"></div>
      <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 rounded-full bg-[#5B8DEF]/20 blur-3xl"></div>

      <div className="relative glass-dark rounded-3xl p-8 max-w-md w-full text-white shadow-2xl float-in">
        <div className="text-center mb-8">
          <div className="w-14 h-14 mx-auto rounded-2xl bg-gradient-to-br from-[#FF6B5B] to-[#F4A259] flex items-center justify-center font-display font-bold text-2xl mb-4">P</div>
          <h1 className="font-display text-2xl font-semibold">Pathway</h1>
          <p className="text-sm text-white/50 mt-1">Your academic journey, organized.</p>
        </div>

        {step === "login" && (
          <div>
            {/* Google renders its own button into this container */}
            <div className="flex justify-center" ref={buttonRef}></div>

            {/* Fallback message if the Google script hasn't initialized */}
            {!window.google && (
              <p className="text-center text-xs text-white/30 mt-3">Loading Google Sign-In…</p>
            )}

            {authError && (
              <p className="text-center text-xs text-[#FF6B5B] mt-3">{authError}</p>
            )}

            <p className="text-center text-xs text-white/30 mt-6">By continuing, you agree to Pathway's Terms & Privacy Policy.</p>
          </div>
        )}

        {step === "profile" && (
          <div className="space-y-3 float-in">
            {googleProfile && (
              <div className="flex items-center gap-3 mb-2 p-3 rounded-xl bg-white/5 border border-white/10">
                {googleProfile.picture ? (
                  <img src={googleProfile.picture} alt="" className="w-10 h-10 rounded-full object-cover" referrerPolicy="no-referrer" />
                ) : (
                  <div className="w-10 h-10 rounded-full bg-[#5B8DEF] flex items-center justify-center font-semibold text-sm">
                    {(googleProfile.name || "?").slice(0,1).toUpperCase()}
                  </div>
                )}
                <div className="overflow-hidden">
                  <p className="text-sm font-medium truncate">{googleProfile.name}</p>
                  <p className="text-xs text-white/40 truncate">{googleProfile.email}</p>
                </div>
              </div>
            )}
            <p className="text-sm text-white/60 mb-4">Welcome! Let's set up your profile.</p>
            <div>
              <label className="text-xs text-white/40 mb-1 block">Full Name</label>
              <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50 placeholder:text-white/30"/>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-white/40 mb-1 block">Academic Year</label>
                <select value={form.year} onChange={e=>setForm({...form,year:e.target.value})} className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50">
                  <option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option>
                </select>
              </div>
              <div>
                <label className="text-xs text-white/40 mb-1 block">Semester</label>
                <select value={form.semester} onChange={e=>setForm({...form,semester:e.target.value})} className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50">
                  {[1,2,3,4,5,6,7,8].map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-white/40 mb-1 block">Branch / Department</label>
                <input value={form.branch} onChange={e=>setForm({...form,branch:e.target.value})} className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50"/>
              </div>
              <div>
                <label className="text-xs text-white/40 mb-1 block">Class</label>
                <input value={form.className} onChange={e=>setForm({...form,className:e.target.value})} placeholder="e.g. A / B / C" className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50 placeholder:text-white/30"/>
              </div>
            </div>
            <button onClick={handleSubmitProfile} disabled={!form.name.trim() || !form.className.trim()} className="w-full bg-[#FF6B5B] text-white rounded-xl py-3 font-medium hover:bg-[#ff5a48] transition-colors mt-2 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
              Get Started
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ---------- ERROR BOUNDARY ----------
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("Render error:", error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding: 24, fontFamily: 'monospace', whiteSpace: 'pre-wrap', color: '#FF6B5B', background:'#1E1B4B', minHeight:'100vh'}}>
          <h2>Something went wrong</h2>
          <p>{String(this.state.error && this.state.error.message)}</p>
          <pre>{String(this.state.error && this.state.error.stack)}</pre>
        </div>
      );
    }
    return this.props.children;
  }
}

window.addEventListener('error', (e) => {
  console.error('Global error:', e.error || e.message, e.filename, e.lineno, e.colno);
});

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
