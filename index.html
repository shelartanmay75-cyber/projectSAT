<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

// ---------- CUSTOM HOOKS & HELPERS ----------
function usePersistedState(key, defaultValue) {
  const [state, setState] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : defaultValue;
    } catch { return defaultValue; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(state)); } catch {}
  }, [state, key]);
  return [state, setState];
}

function getInitials(name) {
  if (!name) return "";
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) {
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }
  return parts[0].slice(0, 2).toUpperCase();
}

// ---------- TOAST SYSTEM ----------
const ToastContext = React.createContext();

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  
  const showToast = (message, type = "info") => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => {
      setToasts(prev => prev.filter(t => t.id !== id));
    }, 3000);
  };
  
  return (
    <ToastContext.Provider value={{ showToast }}>
      {children}
      <ToastContainer toasts={toasts} setToasts={setToasts} />
    </ToastContext.Provider>
  );
}

function useToast() {
  return React.useContext(ToastContext);
}

function ToastContainer({ toasts, setToasts }) {
  const colors = {
    success: "#7C9885",
    error: "#FF6B5B",
    info: "#5B8DEF",
    warning: "#F4A259"
  };
  
  return (
    <div className="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none">
      {toasts.map(t => (
        <div
          key={t.id}
          className="bg-[#1E1B4B] text-white px-4 py-3 rounded-2xl shadow-2xl flex items-center gap-2.5 border border-white/10 float-in text-sm font-medium pointer-events-auto transition-opacity duration-300"
          style={{ animation: "float-in 0.3s ease-out" }}
        >
          <span className="w-2.5 h-2.5 rounded-full pulse" style={{ backgroundColor: colors[t.type] || colors.info }}></span>
          <span>{t.message}</span>
          <button
            onClick={() => setToasts(prev => prev.filter(it => it.id !== t.id))}
            className="ml-2 text-white/50 hover:text-white"
          >
            <I name="x" size={14} />
          </button>
        </div>
      ))}
    </div>
  );
}

// ---------- GOOGLE OAUTH CONFIG ----------
// SETUP: Replace with your Google OAuth Client ID from 
// https://console.cloud.google.com/apis/credentials
// Add your hosting domain to "Authorized JavaScript origins".
// For local testing, add http://localhost to origins.
const GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com";

// Decode a JWT credential returned by Google Identity Services (no verification —
// this is fine for client-side display, but a real backend should verify the token).
function decodeJwt(token) {
  try {
    const payload = token.split('.')[1];
    const json = decodeURIComponent(atob(payload.replace(/-/g,'+').replace(/_/g,'/')).split('').map(c =>
      '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));
    return JSON.parse(json);
  } catch (e) {
    console.error("Failed to decode JWT:", e);
    return null;
  }
}

function AddCAModal({ defaultSubject, onClose, onSave }) {
  const [subject, setSubject] = useState(defaultSubject);
  const [caName, setCaName] = useState("CA-2");
  const [customName, setCustomName] = useState("");
  const [date, setDate] = useState("");
  const [time, setTime] = useState("10:00 AM - 11:00 AM");
  const [venue, setVenue] = useState("Room 204");
  const [marks, setMarks] = useState(20);
  const [topicsStr, setTopicsStr] = useState("");
  const [syllabus, setSyllabus] = useState("");

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!date || !time || !venue || !topicsStr || !syllabus) {
      alert("Please fill all required fields!");
      return;
    }
    const finalName = caName === "custom" ? (customName || "Custom Assessment") : caName;
    const topics = topicsStr.split(",").map(t => t.trim()).filter(Boolean);
    
    // Generate simple ID
    const cleanName = finalName.toLowerCase().replace(/[^a-z0-9]/g, "-");
    const id = `${subject}-${cleanName}-${Date.now()}`;

    // Determine status based on date
    const days = daysUntil(date);
    const status = days < 0 ? "Completed" : "Upcoming";

    onSave({
      id,
      name: finalName,
      subject,
      type: "ca",
      date,
      time,
      venue,
      marks: Number(marks) || 20,
      topics,
      syllabus,
      status
    });
  };

  const selectedSubj = subjectById(subject);

  return (
    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white rounded-3xl max-w-lg w-full p-6 shadow-2xl relative float-in overflow-hidden max-h-[95vh] flex flex-col border border-[var(--line)]" onClick={e=>e.stopPropagation()}>
        {/* Top visual banner */}
        <div className="absolute top-0 left-0 right-0 h-2" style={{ background: selectedSubj ? selectedSubj.color : "#FF6B5B" }}></div>

        {/* Header */}
        <div className="flex items-start justify-between mb-4 pt-2">
          <div className="flex items-center gap-3">

                  placeholder="e.g. Surprise Test 1"
                  value={customName}
                  onChange={e => setCustomName(e.target.value)}
                  className="w-full px-3.5 py-2.5 rounded-xl border border-[var(--line)] text-sm text-[#1E1B4B] focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30 placeholder:text-[#1E1B4B]/30"

                />

          {/* Date and Marks */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">

                className="w-full px-3.5 py-2.5 rounded-xl border border-[var(--line)] text-sm text-[#1E1B4B] focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30"

            <div>
              <label className="text-xs font-semibold text-[#1E1B4B]/50 uppercase tracking-wider mb-1 block">Marks *</label>
              <input
                type="number"
                value={marks}
                onChange={e => setMarks(e.target.value)}
                min={1}
                max={100}
                className="w-full px-3.5 py-2.5 rounded-xl border border-[var(--line)] text-sm text-[#1E1B4B] focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30"
                required

          {/* Timings and Venue */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">

              <label className="text-xs font-semibold text-[#1E1B4B]/50 uppercase tracking-wider mb-1 block">Timings *</label>

                type="text"
                placeholder="e.g. 10:00 AM - 11:00 AM"

}

function CAModule({ cas, setCas }) {
  const [activeSubject, setActiveSubject] = useState("math");
  const [selectedExam, setSelectedExam] = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);

  // Filter exams for active subject in chronological order
  const subjectExams = useMemo(() => {
    return cas
      .filter(ca => ca.subject === activeSubject)
      .sort((a, b) => new Date(a.date) - new Date(b.date));
  }, [activeSubject, cas]);

  const activeSubj = subjectById(activeSubject);

  const deleteCA = (id, e) => {
    e.stopPropagation();
    if (confirm("Are you sure you want to delete this CA?")) {
      setCas(cas.filter(ca => ca.id !== id));
      if (selectedExam && selectedExam.id === id) {
        setSelectedExam(null);
      }
    }
  };

  return (
    <div className="flex flex-col lg:flex-row gap-6 float-in">
      {/* Left Panel: Subject Selector */}
      <div className="w-full lg:w-72 shrink-0 space-y-3">
        <h3 className="font-display font-semibold text-[#1E1B4B] text-base px-1">Subjects</h3>
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-3">
          {SUBJECTS.map(s => {
            const subjectExamsList = cas.filter(ca => ca.subject === s.id);
            const completedCount = subjectExamsList.filter(ca => ca.status === "Completed" || daysUntil(ca.date) < 0).length;
            const totalCount = subjectExamsList.length;
            const isActive = activeSubject === s.id;

            return (
              <div
                key={s.id}
                onClick={() => setActiveSubject(s.id)}
                className={`glass rounded-2xl p-4 shadow-sm hover:shadow-md transition-all cursor-pointer border-2 ${isActive ? "border-[#FF6B5B]" : "border-transparent"}`}
              >
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" style={{ background: `${s.color}1A`, color: s.color }}>
                    <I name={s.icon} size={18} />
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="font-display font-semibold text-[#1E1B4B] text-sm truncate">{s.name}</p>
                    <p className="text-xs text-[#1E1B4B]/40 mt-0.5">{completedCount} of {totalCount} completed</p>
                  </div>
                </div>
                {/* Micro Progress Bar */}
                <div className="mt-3 h-1.5 bg-[#1E1B4B]/5 rounded-full overflow-hidden">
                  <div className="h-full rounded-full transition-all duration-500" style={{ width: totalCount > 0 ? `${(completedCount / totalCount) * 100}%` : "0%", background: s.color }}></div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Right Panel: Exam Sequence Timeline */}
      <div className="flex-1 space-y-6">
        <div className="glass rounded-2xl p-5 shadow-sm flex flex-col sm:flex-row sm:items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <div className="w-12 h-12 rounded-xl flex items-center justify-center" style={{ background: `${activeSubj.color}1A`, color: activeSubj.color }}>
              <I name={activeSubj.icon} size={22} />
            </div>
            <div>
              <h2 className="font-display text-xl font-bold text-[#1E1B4B]">{activeSubj.name}</h2>
              <p className="text-xs text-[#1E1B4B]/40 mt-0.5">Continuous Assessments (CAs)</p>
            </div>
          </div>
          <button
            onClick={() => setShowAddModal(true)}
            className="px-4 py-2.5 rounded-xl bg-[#FF6B5B] hover:bg-[#ff5a48] text-white text-sm font-semibold flex items-center justify-center gap-2 shadow-md transition-all shrink-0 active:scale-[0.98]"
          >
            <I name="plus" size={16} /> Add CA
          </button>
        </div>

        {/* Timeline Pipeline */}
        {subjectExams.length === 0 ? (
          <div className="glass rounded-2xl p-8 shadow-sm text-center border-2 border-dashed border-[var(--line)]">
            <I name="file-check-2" size={36} className="text-[#1E1B4B]/20 mx-auto mb-3" />
            <p className="text-sm font-medium text-[#1E1B4B]/60">No CAs added for this subject yet.</p>
            <p className="text-xs text-[#1E1B4B]/40 mt-1 mb-4">Click "Add CA" to schedule an upcoming CA announced by the teacher.</p>
            <button
              onClick={() => setShowAddModal(true)}
              className="px-4 py-2 rounded-xl bg-[#1E1B4B]/5 hover:bg-[#1E1B4B]/10 text-[#1E1B4B] text-xs font-semibold inline-flex items-center gap-1.5 transition-colors"
            >
              <I name="plus" size={14} /> Schedule Now
            </button>
          </div>
        ) : (
          <div className="relative pl-6 sm:pl-8 border-l-2 border-[#1E1B4B]/10 space-y-6 py-2 ml-4">
            {subjectExams.map((ca, idx) => {
              const days = daysUntil(ca.date);
              const isCompleted = ca.status === "Completed" || days < 0;

              // Status Badge logic
              let statusText = "";
              let statusClass = "";
              if (isCompleted) {
                statusText = "Completed";
                statusClass = "bg-[#7C9885]/15 text-[#7C9885]";
              } else {
                if (days === 0) {
                  statusText = "Today";
                  statusClass = "bg-[#FF6B5B]/15 text-[#FF6B5B] pulse";
                } else if (days === 1) {
                  statusText = "Tomorrow";
                  statusClass = "bg-[#FF6B5B]/15 text-[#FF6B5B]";
                } else {
                  statusText = `${days}d left`;
                  statusClass = "bg-[#F4A259]/15 text-[#F4A259]";
                }
              }

              return (
                <div key={ca.id} className="relative group">
                  {/* Timeline Marker Dot */}
                  <div
                    className={`absolute -left-[31px] sm:-left-[39px] top-4 w-4 h-4 rounded-full border-4 flex items-center justify-center bg-white transition-all duration-300 z-10
                      ${isCompleted ? "border-[#7C9885] bg-[#7C9885]" : "border-[#1E1B4B]/20 group-hover:border-[#FF6B5B]"}`}
                  >
                    {isCompleted && <div className="w-1.5 h-1.5 rounded-full bg-white"></div>}
                  </div>

                  {/* Exam Card */}
                  <div
                    onClick={() => setSelectedExam(ca)}
                    className={`glass rounded-2xl p-5 shadow-sm hover:shadow-md transition-all cursor-pointer border-2 hover:-translate-y-0.5 relative overflow-hidden
                      ${isCompleted ? "border-transparent opacity-85" : "border-[#1E1B4B]/5 hover:border-[#FF6B5B]"}`}
                  >
                    {/* Top color ribbon */}
                    <div className="absolute top-0 left-0 right-0 h-1" style={{ background: activeSubj.color }}></div>

                    <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-3">
                      <div className="flex items-center gap-2">
                        <span className="text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider bg-[#F4A259]/15 text-[#F4A259]">
                          CA
                        </span>
                        <h3 className="font-display font-semibold text-base text-[#1E1B4B]">{ca.name}</h3>
                      </div>
                      <div className="flex items-center gap-3">
                        <span className={`text-xs font-semibold px-3 py-1 rounded-full w-max ${statusClass}`}>
                          {statusText}
                        </span>
                        <button
                          onClick={(e) => deleteCA(ca.id, e)}
                          className="w-7 h-7 rounded-lg hover:bg-red-500/10 text-[#1E1B4B]/30 hover:text-red-500 flex items-center justify-center transition-colors shrink-0"
                          title="Delete CA"
                        >
                          <I name="x" size={14} />
                        </button>
                      </div>
                    </div>

                    <div className="flex flex-wrap items-center gap-x-4 gap-y-2 text-sm text-[#1E1B4B]/50 mb-3">
                      <span className="flex items-center gap-1.5"><I name="calendar" size={13}/> {fmtDate(ca.date)}</span>
                      <span className="flex items-center gap-1.5"><I name="clock" size={13}/> {ca.time}</span>
                      <span className="flex items-center gap-1.5"><I name="map-pin" size={13}/> {ca.venue}</span>
                      <span className="flex items-center gap-1.5 font-medium text-[#1E1B4B]/70"><I name="trophy" size={13}/> {ca.marks} Marks</span>
                    </div>

                    <div>
                      <p className="text-xs font-semibold text-[#1E1B4B]/30 mb-2 uppercase tracking-wider">Key Topics</p>
                      <div className="flex flex-wrap gap-1.5">
                        {ca.topics.map(t => (
                          <span key={t} className="text-xs px-2.5 py-1 rounded-lg bg-[#1E1B4B]/5 text-[#1E1B4B]/60">{t}</span>
                        ))}
                      </div>
                    </div>

                    <div className="mt-4 pt-3 border-t border-[var(--line)] flex items-center justify-between text-xs text-[#1E1B4B]/40">
                      <span className="flex items-center gap-1.5">
                        <I name="bell-ring" size={13} /> Reminders active
                      </span>
                      <span className="text-[#FF6B5B] font-semibold group-hover:underline flex items-center gap-1">
                        View Syllabus & Details <I name="arrow-right" size={12} />
                      </span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Interactive Detail Modal */}
      {selectedExam && (
        <ExamDetailModal
          exam={selectedExam}
          subject={subjectById(selectedExam.subject)}
          onClose={() => setSelectedExam(null)}
          onDelete={(id, e) => {
            deleteCA(id, e);
          }}
        />
      )}

      {/* Add CA Modal */}
      {showAddModal && (
        <AddCAModal
          defaultSubject={activeSubject}
          onClose={() => setShowAddModal(false)}
          onSave={(newCA) => {
            setCas([...cas, newCA]);
            setShowAddModal(false);
          }}
        />
      )}
    </div>
  );
}

function CalendarModule({ cas }) {
  const [view, setView] = useState("month");
  const [selectedEvent, setSelectedEvent] = useState(null);

  const events = [
    ...ASSIGNMENTS.map(a => ({ date: a.due, title: a.title, type: "assignment", color: "#FF6B5B", subject: subjectById(a.subject).name })),
    ...cas.map(c => ({
      date: c.date,
      title: `${c.name} — ${subjectById(c.subject).name}`,
      type: c.type === "ca" ? "ca" : "exam",
      color: c.type === "ese" ? "#9B6BFF" : c.type === "mt" ? "#5B8DEF" : "#F4A259",
      subject: subjectById(c.subject).name,
      time: c.time,
      venue: c.venue
    })),
    { date: "2026-06-13", title: "Group Study — Differential Equations", type: "study", color: "#7C9885", subject: "Engineering Mathematics" },
    { date: "2026-06-17", title: "Group Study — Pointers Practice", type: "study", color: "#7C9885", subject: "Programming in C" },
  ];

  // June 2026 calendar grid (June 1, 2026 is a Monday)
  const daysInMonth = 30;
  const startOffset = 1; // June 1 2026 = Monday (index 1 if Sun=0)
  const cells = [];
  for (let i=0;i<startOffset;i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);

  const eventsForDay = (d) => events.filter(e => new Date(e.date).getDate() === d && new Date(e.date).getMonth() === 5);

  return (
    <div>
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div className="flex items-center gap-2">
          {["Day","Week","Month","Year"].map(v => (
            <button key={v} onClick={() => setView(v.toLowerCase())}
              className={`px-4 py-2 rounded-xl text-sm font-medium transition-all ${view===v.toLowerCase() ? "bg-[#1E1B4B] text-white" : "bg-white text-[#1E1B4B]/60 hover:bg-[#1E1B4B]/5"}`}>
              {v}
            </button>
          ))}
        </div>
        <div className="flex items-center gap-3">
          <button className="w-9 h-9 rounded-lg bg-white flex items-center justify-center text-[#1E1B4B]/50 hover:bg-[#1E1B4B]/5"><I name="chevron-left" size={16}/></button>
          <span className="font-display font-semibold text-[#1E1B4B]">June 2026</span>
          <button className="w-9 h-9 rounded-lg bg-white flex items-center justify-center text-[#1E1B4B]/50 hover:bg-[#1E1B4B]/5"><I name="chevron-right" size={16}/></button>
        </div>
      </div>

      {/* Legend */}
      <div className="flex flex-wrap gap-4 mb-4 text-xs text-[#1E1B4B]/60">
        {[["Assignment Deadlines","#FF6B5B"],["CAs","#F4A259"],["Exams","#5B8DEF"],["Study Tasks","#7C9885"]].map(([l,c])=>(
          <span key={l} className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{background:c}}></span>{l}</span>
        ))}
      </div>

      {view === "month" && (
        <div className="glass rounded-2xl p-4 shadow-sm">
          <div className="grid grid-cols-7 gap-2 mb-2">
            {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => (
              <div key={d} className="text-center text-xs font-semibold text-[#1E1B4B]/40 py-2">{d}</div>
            ))}
          </div>
          <div className="grid grid-cols-7 gap-2">
            {cells.map((d, i) => {
              const dayEvents = d ? eventsForDay(d) : [];
              const isToday = d === 11;
              return (
                <div key={i} className={`min-h-[90px] rounded-xl p-1.5 ${d ? "bg-white/50 hover:bg-white/80" : ""} transition-colors ${isToday ? "ring-2 ring-[#FF6B5B]" : ""}`}>
                  {d && <p className={`text-xs font-medium mb-1 ${isToday ? "text-[#FF6B5B]" : "text-[#1E1B4B]/50"}`}>{d}</p>}
                  <div className="space-y-1">
                    {dayEvents.slice(0,2).map((e,idx) => (
                      <div key={idx} onClick={() => setSelectedEvent(e)} className="text-[10px] px-1.5 py-0.5 rounded truncate cursor-pointer text-white font-medium" style={{background:e.color}}>
                        {e.title}
                      </div>
                    ))}
                    {dayEvents.length > 2 && <p className="text-[10px] text-[#1E1B4B]/30 px-1.5">+{dayEvents.length-2} more</p>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {view !== "month" && (
        <div className="glass rounded-2xl p-8 shadow-sm text-center">
          <I name="calendar-range" size={36} className="text-[#1E1B4B]/20 mx-auto mb-3"/>
          <p className="text-sm text-[#1E1B4B]/50">{view.charAt(0).toUpperCase()+view.slice(1)} view — showing same events in a {view} layout.</p>
          <div className="mt-4 space-y-2 max-w-md mx-auto text-left">
            {events.slice(0,5).map((e,i) => (
              <div key={i} onClick={() => setSelectedEvent(e)} className="flex items-center gap-3 p-2.5 bg-white/60 rounded-xl cursor-pointer hover:bg-white">
                <span className="w-2 h-2 rounded-full" style={{background:e.color}}></span>
                <span className="text-sm text-[#1E1B4B]/70 flex-1 truncate">{e.title}</span>
                <span className="text-xs text-[#1E1B4B]/40">{fmtDate(e.date)}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {selectedEvent && (
        <div className="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setSelectedEvent(null)}>
          <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl" onClick={e=>e.stopPropagation()}>
            <div className="w-10 h-10 rounded-xl flex items-center justify-center mb-3" style={{background:`${selectedEvent.color}1A`, color:selectedEvent.color}}>
              <I name={selectedEvent.type==='assignment'?'clipboard-list':selectedEvent.type==='ca'?'file-check-2':selectedEvent.type==='exam'?'graduation-cap':'users'} size={18}/>
            </div>
            <h3 className="font-display font-semibold text-[#1E1B4B] mb-1">{selectedEvent.title}</h3>
            <p className="text-sm text-[#1E1B4B]/50 mb-3">{selectedEvent.subject}</p>
            <div className="text-sm text-[#1E1B4B]/60 space-y-1">
              <p className="flex items-center gap-2"><I name="calendar" size={14}/> {fmtDate(selectedEvent.date)}, 2026</p>
              {selectedEvent.time && <p className="flex items-center gap-2"><I name="clock" size={14}/> {selectedEvent.time}</p>}
              {selectedEvent.venue && <p className="flex items-center gap-2"><I name="map-pin" size={14}/> {selectedEvent.venue}</p>}
            </div>
            <button onClick={() => setSelectedEvent(null)} className="mt-4 w-full py-2.5 rounded-xl bg-[#1E1B4B] text-white text-sm font-medium">Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

    name: user.name,
    branch: user.branch,
    year: user.year,
    semester: user.semester,
    className: user.className || "A",
  });

  const [notifPrefs, setNotifPrefs] = usePersistedState("pathway-notif-prefs", {
    deadline: true,

    announcements: true

  const handleSave = () => {
    if (!form.name.trim() || !form.className.trim()) {
      showToast("Name and Class cannot be empty!", "error");
      return;
    }
    const updatedUser = {
      ...user,
      ...form,
      avatar: getInitials(form.name),
    };
    setUser(updatedUser);
    localStorage.setItem("pathway-user", JSON.stringify(updatedUser));
    showToast("Changes saved successfully!", "success");
  };

  const handleExportData = () => {
    const data = {
      user,
      theme,
      notifPrefs,
      assignments,
      cas,
      notifications,
      messages,
      events,
      pyqUploads
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `Pathway_Data_Export_${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("Data exported successfully!", "success");
  };

  const handleResetData = () => {
    if (window.confirm("Are you sure you want to reset all data? This will clear all items and reload the page.")) {
      const keysToRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith("pathway-")) {
          keysToRemove.push(key);
        }
      }
      keysToRemove.forEach(k => localStorage.removeItem(k));
      showToast("All data reset. Reloading...", "info");
      setTimeout(() => {
        window.location.reload();
      }, 1000);
    }
  };

  return (
    <div className="max-w-xl space-y-6">
      {/* Profile Section */}

            {getInitials(form.name) || "?"}
          </div>
          <div>
            <p className="font-medium text-[#1E1B4B]">{user.name}</p>
            <p className="text-sm text-[#1E1B4B]/40">{user.email || "No email linked"}</p>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-4">
          <div>
            <label className="text-xs font-medium text-[#1E1B4B]/40 mb-1.5 block">Full Name</label>
            <input value={form.name} onChange={e=>setForm({...form, name:e.target.value})} className="w-full px-3 py-2 rounded-xl border border-[var(--line)] text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30" />
          </div>
          <div>
            <label className="text-xs font-medium text-[#1E1B4B]/40 mb-1.5 block">Branch / Department</label>
            <input value={form.branch} onChange={e=>setForm({...form, branch:e.target.value})} className="w-full px-3 py-2 rounded-xl border border-[var(--line)] text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30" />
          </div>
          <div>
            <label className="text-xs font-medium text-[#1E1B4B]/40 mb-1.5 block">Academic Year</label>
            <select value={form.year} onChange={e=>setForm({...form, year:e.target.value})} className="w-full px-3 py-2 rounded-xl border border-[var(--line)] text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30">
              <option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option>
            </select>
          </div>
          <div>
            <label className="text-xs font-medium text-[#1E1B4B]/40 mb-1.5 block">Semester</label>
            <select value={form.semester} onChange={e=>setForm({...form, semester:e.target.value})} className="w-full px-3 py-2 rounded-xl border border-[var(--line)] text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30">
              {[1,2,3,4,5,6,7,8].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div className="col-span-2">
            <label className="text-xs font-medium text-[#1E1B4B]/40 mb-1.5 block">Class</label>
            <input value={form.className} onChange={e=>setForm({...form, className:e.target.value})} className="w-full px-3 py-2 rounded-xl border border-[var(--line)] text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30" />

        <button onClick={handleSave} className="mt-5 px-5 py-2.5 rounded-xl bg-[#1E1B4B] text-white text-sm font-medium hover:bg-[#2a266a] transition-colors">Save Changes</button>

      {/* Notification Preferences */}
      <div className="glass rounded-2xl p-6 shadow-sm">

        <div className="space-y-4">
          {[

            { id: "ca", label: "CA reminders", desc: "Get notified of upcoming continuous assessments" },
            { id: "community", label: "Community activity", desc: "Get alerts when peers reply to your doubts" },
            { id: "announcements", label: "System announcements", desc: "Important updates from the Pathway platform" },
          ].map(pref => (

function LevelBadge({ level }) {

}

function CommunityChat({ room, setRoom, messages, setMessages }) {
  const [input, setInput] = useState("");
  const [typing, setTyping] = useState(true);
  const scrollRef = useRef(null);

  const rooms = [
    { id: "general", label: "Global Community", icon: "globe-2" },
    ...SUBJECTS.map(s => ({ id: s.id, label: s.name, icon: s.icon, color: s.color })),
  ];

  const roomMessages = messages.filter(m => m.room === room || (room !== "general" && m.room === "general" && false));

  useEffect(() => {
    scrollRef.current?.scrollTo({ top: scrollRef.current.scrollHeight, behavior: "smooth" });
  }, [messages, room]);

  const send = () => {
    if (!input.trim()) return;
    setMessages([...messages, { id: Date.now(), user: { name: "You", avatar: "ME", color: "#1E1B4B" }, text: input, time: "now", room }]);
    setInput("");
  };

  const currentRoom = rooms.find(r => r.id === room);

  return (
    <div className="flex h-[calc(100vh-220px)] min-h-[480px] glass rounded-2xl overflow-hidden shadow-sm">

        <div className="p-3 border-b border-[var(--line)]">
          <p className="text-xs font-semibold text-[#1E1B4B]/40 uppercase tracking-wide px-2">Discussion Rooms</p>
        </div>
        <div className="flex-1 overflow-y-auto scrollbar-none p-2 space-y-1">
          {rooms.map(r => (
            <button key={r.id} onClick={() => setRoom(r.id)}
              className={`w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm transition-colors ${room===r.id ? "bg-[#1E1B4B] text-white" : "text-[#1E1B4B]/60 hover:bg-white/80"}`}>
              <I name={r.icon} size={15} />
              <span className="truncate flex-1 text-left">{r.label}</span>
            </button>
          ))}
        </div>
        <div className="p-3 border-t border-[var(--line)]">
          <p className="text-xs font-semibold text-[#1E1B4B]/40 uppercase tracking-wide px-2 mb-2">Online Now</p>
          <div className="space-y-1.5 px-1">
            {ONLINE_STUDENTS.map(s => (
              <div key={s.id} className="flex items-center gap-2">
                <div className="relative">
                  <div className="w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-semibold text-white" style={{background:s.color}}>{s.avatar}</div>

          </div>
        </div>
      </div>

      {/* Chat */}
      <div className="flex-1 flex flex-col min-w-0">
        <div className="p-4 border-b border-[var(--line)] flex items-center justify-between bg-white/40">
          <div className="flex items-center gap-2">
            <I name={currentRoom.icon} size={18} style={currentRoom.color ? {color: currentRoom.color} : {}}/>
            <div>
              <p className="font-medium text-[#1E1B4B] text-sm">{currentRoom.label}</p>
              <p className="text-xs text-[#1E1B4B]/40">{ONLINE_STUDENTS.filter(s=>s.status==='online').length} online</p>
            </div>
          </div>
          <I name="search" size={16} className="text-[#1E1B4B]/30"/>

                <div className={`flex items-center gap-2 mb-1 ${m.user.name==='You' ? "flex-row-reverse" : ""}`}>
                  <span className="text-xs font-medium text-[#1E1B4B]">{m.user.name}</span>
                  <span className="text-[10px] text-[#1E1B4B]/30">{m.time}</span>
                </div>
                <div className={`rounded-2xl px-3.5 py-2.5 text-sm ${m.user.name==='You' ? "bg-[#FF6B5B] text-white rounded-tr-sm" : "bg-white text-[#1E1B4B]/80 rounded-tl-sm"} shadow-sm`}>

                      <p className="text-xs font-medium text-[#1E1B4B] truncate">{m.attachment.name}</p>

                  </div>
                )}
                <div className={`flex gap-1 mt-1 ${m.user.name==='You' ? "flex-row-reverse" : ""}`}>
                  {["👍","❤️","😄"].map(e => <span key={e} className="text-xs bg-white/80 rounded-full px-1.5 py-0.5 cursor-pointer hover:scale-110 transition-transform shadow-sm">{e}</span>)}
                </div>
              </div>
            </div>
          ))}
          {typing && (
            <div className="flex items-center gap-2 text-xs text-[#1E1B4B]/40 pl-11">
              <div className="flex gap-0.5">
                <span className="w-1.5 h-1.5 rounded-full bg-[#1E1B4B]/30 animate-bounce" style={{animationDelay:'0ms'}}></span>
                <span className="w-1.5 h-1.5 rounded-full bg-[#1E1B4B]/30 animate-bounce" style={{animationDelay:'150ms'}}></span>
                <span className="w-1.5 h-1.5 rounded-full bg-[#1E1B4B]/30 animate-bounce" style={{animationDelay:'300ms'}}></span>
              </div>
              Rohan Das is typing...
            </div>
          )}
        </div>

        <div className="p-3 border-t border-[var(--line)] bg-white/40">
          <div className="flex items-center gap-2">
            <button className="w-9 h-9 rounded-xl flex items-center justify-center text-[#1E1B4B]/40 hover:bg-white transition-colors shrink-0"><I name="paperclip" size={17}/></button>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}
              placeholder={`Message ${currentRoom.label}... use @ to mention`}
              className="flex-1 px-4 py-2.5 rounded-xl border border-[var(--line)] bg-white text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30" />
            <button className="w-9 h-9 rounded-xl flex items-center justify-center text-[#1E1B4B]/40 hover:bg-white transition-colors shrink-0"><I name="smile" size={17}/></button>
            <button onClick={send} className="w-9 h-9 rounded-xl flex items-center justify-center bg-[#FF6B5B] text-white hover:bg-[#ff5a48] transition-colors shrink-0"><I name="send" size={15}/></button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------- LOGIN ----------
function Login({ onLogin }) {
  const [step, setStep] = useState("login");
  const [googleProfile, setGoogleProfile] = useState(null); // { name, email, picture, sub }
  const [authError, setAuthError] = useState("");
  const [form, setForm] = useState({ name: "", year: "2nd Year", semester: "3", branch: "Computer Science", className: "" });
  const [localEmail, setLocalEmail] = useState("");
  const [localPassword, setLocalPassword] = useState("");
  const buttonRef = useRef(null);

  // Initialize Google Identity Services once the script has loaded
  useEffect(() => {
    let cancelled = false;

    const handleCredentialResponse = (response) => {
      const payload = decodeJwt(response.credential);
      if (!payload) {
        setAuthError("Couldn't read your Google profile. Please try again.");
        return;
      }
      setAuthError("");
      setGoogleProfile({
        name: payload.name || "",
        email: payload.email || "",
        picture: payload.picture || "",
        sub: payload.sub || "",
      });
      // Prefill the profile form with the name Google gave us
      setForm(f => ({ ...f, name: payload.name || f.name }));
      setStep("profile");
    };

    const init = () => {
      if (cancelled) return;
      if (!window.google || !window.google.accounts || !window.google.accounts.id) {
        // Google script not ready yet — retry shortly
        setTimeout(init, 200);
        return;
      }
      try {
        window.google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: handleCredentialResponse,
          auto_select: false,
        });
        if (buttonRef.current) {
          window.google.accounts.id.renderButton(buttonRef.current, {
            type: "standard",
            theme: "filled_white",
            size: "large",
            shape: "pill",
            text: "continue_with",
            logo_alignment: "left",
            width: 320,
          });
        }
      } catch (e) {
        console.error("Google Identity Services init failed:", e);
        setAuthError("Google Sign-In couldn't load. Check your Client ID and authorized origins.");
      }
    };

    init();
    return () => { cancelled = true; };
  }, []);

  const handleSubmitProfile = () => {
    if (!form.name.trim() || !form.semester || !form.className.trim()) return;
    onLogin({
      name: form.name,
      email: googleProfile ? googleProfile.email : "",
      picture: googleProfile ? googleProfile.picture : "",
      year: form.year,
      semester: form.semester,
      branch: form.branch,
      className: form.className,
      avatar: getInitials(form.name),
    });
  };

  const handleLocalSubmit = (e) => {
    e.preventDefault();
    if (localEmail.trim() && localPassword.trim()) {
      setGoogleProfile({
        name: "",
        email: localEmail.trim(),
        picture: "",
        sub: "",
      });
      const namePart = localEmail.split('@')[0];
      const nameCapitalized = namePart.charAt(0).toUpperCase() + namePart.slice(1);
      setForm(f => ({ ...f, name: nameCapitalized }));
      setStep("profile");
    }
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden" style={{background:"linear-gradient(135deg,#1E1B4B 0%,#2d2870 50%,#1E1B4B 100%)"}}>
      <div className="absolute top-[-10%] left-[-10%] w-96 h-96 rounded-full bg-[#FF6B5B]/20 blur-3xl"></div>
      <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 rounded-full bg-[#5B8DEF]/20 blur-3xl"></div>

      <div className="relative glass-dark rounded-3xl p-8 max-w-md w-full text-white shadow-2xl float-in">
        <div className="text-center mb-8">
          <div className="w-14 h-14 mx-auto rounded-2xl bg-gradient-to-br from-[#FF6B5B] to-[#F4A259] flex items-center justify-center font-display font-bold text-2xl mb-4">P</div>
          <h1 className="font-display text-2xl font-semibold">Pathway</h1>
          <p className="text-sm text-white/50 mt-1">Your academic journey, organized.</p>
        </div>

        {step === "login" && (
          <div className="space-y-4">
            {/* Google renders its own button into this container */}
            <div className="flex justify-center" ref={buttonRef}></div>

            {/* Fallback message if the Google script hasn't initialized */}
            {!window.google && (
              <p className="text-center text-xs text-white/30 mt-3">Loading Google Sign-In…</p>
            )}

            {authError && (
              <p className="text-center text-xs text-[#FF6B5B] mt-3">{authError}</p>
            )}

            <div className="relative flex py-2 items-center">
              <div className="flex-grow border-t border-white/10"></div>
              <span className="flex-shrink mx-4 text-white/35 text-xs uppercase font-semibold">or</span>
              <div className="flex-grow border-t border-white/10"></div>
            </div>

            <form onSubmit={handleLocalSubmit} className="space-y-3">
              <div>
                <label className="text-xs text-white/40 mb-1 block">Email Address</label>
                <input
                  type="email"
                  required
                  value={localEmail}
                  onChange={e => setLocalEmail(e.target.value)}
                  placeholder="you@example.com"
                  className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50 placeholder:text-white/30"
                />
              </div>
              <div>
                <label className="text-xs text-white/40 mb-1 block">Password</label>
                <input
                  type="password"
                  required
                  value={localPassword}
                  onChange={e => setLocalPassword(e.target.value)}
                  placeholder="••••••••"
                  className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50 placeholder:text-white/30"
                />
              </div>
              <button
                type="submit"
                disabled={!localEmail.trim() || !localPassword.trim()}
                className="w-full bg-[#5B8DEF] text-white rounded-xl py-3 text-sm font-medium hover:bg-[#4a7cdc] transition-colors mt-2 shadow-lg disabled:opacity-50"
              >
                Sign in
              </button>
            </form>

            <div className="relative flex py-2 items-center">
              <div className="flex-grow border-t border-white/10"></div>
              <span className="flex-shrink mx-4 text-white/35 text-xs uppercase font-semibold">explore</span>
              <div className="flex-grow border-t border-white/10"></div>
            </div>

            <button
              type="button"
              onClick={() => {
                onLogin({
                  name: "Demo Student",
                  email: "demo@pathway.app",
                  picture: "",
                  year: "2nd Year",
                  semester: "3",
                  branch: "Computer Science",
                  className: "A",
                  avatar: "DS",
                });
              }}
              className="w-full bg-white/10 border border-white/10 hover:bg-white/15 text-white rounded-xl py-3 text-sm font-medium transition-colors shadow-lg"
            >
              Demo / Guest Account
            </button>

            <p className="text-center text-xs text-white/30 mt-6">By continuing, you agree to Pathway's Terms & Privacy Policy.</p>
          </div>
        )}

        {step === "profile" && (
          <div className="space-y-3 float-in">
            {googleProfile && (
              <div className="flex items-center gap-3 mb-2 p-3 rounded-xl bg-white/5 border border-white/10">
                {googleProfile.picture ? (
                  <img src={googleProfile.picture} alt="" className="w-10 h-10 rounded-full object-cover" referrerPolicy="no-referrer" />
                ) : (
                  <div className="w-10 h-10 rounded-full bg-[#5B8DEF] flex items-center justify-center font-semibold text-sm">
                    {getInitials(form.name) || "?"}
                  </div>
                )}
                <div className="overflow-hidden">
                  <p className="text-sm font-medium truncate">{form.name || googleProfile.name || "Student"}</p>
                  <p className="text-xs text-white/40 truncate">{googleProfile.email}</p>
                </div>
              </div>
            )}
            <p className="text-sm text-white/60 mb-4">Welcome! Let's set up your profile.</p>
            <div className="flex items-end gap-3">
              <div className="w-12 h-12 rounded-full bg-gradient-to-br from-[#5B8DEF] to-[#9B6BFF] flex items-center justify-center font-display font-semibold text-white text-base shrink-0 mb-1">
                {getInitials(form.name) || "?"}
              </div>
              <div className="flex-1">
                <label className="text-xs text-white/40 mb-1 block">Full Name</label>
                <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50 placeholder:text-white/30"/>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-white/40 mb-1 block">Academic Year</label>
                <select value={form.year} onChange={e=>setForm({...form,year:e.target.value})} className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50">
                  <option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option>
                </select>
              </div>
              <div>
                <label className="text-xs text-white/40 mb-1 block">Semester</label>
                <select value={form.semester} onChange={e=>setForm({...form,semester:e.target.value})} className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50">
                  {[1,2,3,4,5,6,7,8].map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-white/40 mb-1 block">Branch / Department</label>
                <input value={form.branch} onChange={e=>setForm({...form,branch:e.target.value})} className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50"/>
              </div>
              <div>
                <label className="text-xs text-white/40 mb-1 block">Class</label>
                <input value={form.className} onChange={e=>setForm({...form,className:e.target.value})} placeholder="e.g. A / B / C" className="w-full px-3 py-2.5 rounded-xl bg-white/10 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/50 placeholder:text-white/30"/>
              </div>
            </div>
            <button onClick={handleSubmitProfile} disabled={!form.name.trim() || !form.className.trim()} className="w-full bg-[#FF6B5B] text-white rounded-xl py-3 font-medium hover:bg-[#ff5a48] transition-colors mt-2 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
              Get Started
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ---------- APP ROOT ----------
const PAGE_META = {
  dashboard: { title: "Dashboard", subtitle: "Welcome back! Here's your academic overview." },
  assignments: { title: "Assignments", subtitle: "Track and manage your coursework." },
  cas: { title: "Cumulative Assessments", subtitle: "Stay on top of upcoming CAs." },
  pyqs: { title: "Previous Year Questions", subtitle: "Browse and download past papers." },
  material: { title: "Study Material", subtitle: "Books, videos, and resources by subject." },
  calendar: { title: "Academic Calendar", subtitle: "All your deadlines and events in one place." },
  community: { title: "", subtitle: "" },
  notifications: { title: "Notifications", subtitle: "Stay updated with reminders and activity." },
  settings: { title: "Settings", subtitle: "Manage your profile and preferences." },
};

function App() {
  const [user, setUser] = useState(() => {
    try {
      const raw = localStorage.getItem("pathway-user");
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.name) return parsed;
      }
    } catch (e) {}
    return null;
  });

  const [page, setPage] = useState("dashboard");
  const [collapsed, setCollapsed] = useState(false);
  const [search, setSearch] = useState("");
  const [assignments, setAssignments] = usePersistedState("pathway-assignments", ASSIGNMENTS);
  const [cas, setCas] = usePersistedState("pathway-cas", INITIAL_CAS);
  const [notifications, setNotifications] = usePersistedState("pathway-notifications", NOTIFICATIONS);
  const [messages, setMessages] = usePersistedState("pathway-community-messages", COMMUNITY_MESSAGES);
  const [events, setEvents] = usePersistedState("pathway-events", [
    { date: "2026-06-13", title: "Group Study — Differential Equations", type: "study", color: "#7C9885", subject: "Engineering Mathematics" },
    { date: "2026-06-17", title: "Group Study — Pointers Practice", type: "study", color: "#7C9885", subject: "Programming in C" },
  ]);
  const [pyqUploads, setPyqUploads] = usePersistedState("pathway-pyq-uploads", []);
  
  const [theme, setTheme] = useState(() => {
    try {
      return document.documentElement.classList.contains('dark') ? 'dark' : (localStorage.getItem('pathway-theme') || 'light');
    } catch (e) { return 'light'; }
  });

  // Apply theme class to <html> and persist
  useEffect(() => {
    const root = document.documentElement;
    if (theme === 'dark') {
      root.classList.add('dark');
    } else {
      root.classList.remove('dark');
    }
    try { localStorage.setItem('pathway-theme', theme); } catch (e) {}
  }, [theme]);

  const handleLogin = (u) => {
    setUser(u);
    localStorage.setItem("pathway-user", JSON.stringify(u));
  };

  const handleLogout = () => {
    localStorage.removeItem("pathway-user");
    setUser(null);
    setPage("dashboard");
  };

  if (!user) {
    return <Login onLogin={handleLogin} />;
  }

  const meta = PAGE_META[page];
  const isCommunity = page === "community";

  return (
    <div className="min-h-screen flex">
      <Sidebar page={page} setPage={setPage} collapsed={collapsed} setCollapsed={setCollapsed} user={user} onLogout={handleLogout} />
      <main className={`flex-1 transition-all duration-300 ${collapsed ? "ml-20" : "ml-64"} p-4 md:p-8`}>
        {!isCommunity && <Topbar title={meta.title} subtitle={meta.subtitle} search={search} setSearch={setSearch} user={user} />}
        {isCommunity && (
          <div className="flex justify-end mb-2">
            <div className="w-10 h-10 rounded-full bg-gradient-to-br from-[#5B8DEF] to-[#9B6BFF] flex items-center justify-center font-display font-semibold text-white text-sm shrink-0">{user.avatar}</div>
          </div>
        )}

        {page === "dashboard" && <Dashboard setPage={setPage} cas={cas} assignments={assignments} />}
        {page === "assignments" && <Assignments items={assignments} setItems={setAssignments} />}
        {page === "cas" && <CAModule cas={cas} setCas={setCas} />}
        {page === "pyqs" && <PYQModule />}
        {page === "material" && <StudyMaterial />}
        {page === "calendar" && <CalendarModule cas={cas} assignments={assignments} events={events} setEvents={setEvents} />}
        {page === "community" && <HelpEachOther messages={messages} setMessages={setMessages} />}
        {page === "notifications" && <NotificationsModule items={notifications} setItems={setNotifications} />}
        {page === "settings" && (
          <SettingsModule
            user={user}
            setUser={setUser}
            theme={theme}
            setTheme={setTheme}
            onLogout={handleLogout}
            assignments={assignments}
            cas={cas}
            notifications={notifications}
            messages={messages}
            events={events}
            pyqUploads={pyqUploads}
            setAssignments={setAssignments}
            setCas={setCas}
            setNotifications={setNotifications}
            setMessages={setMessages}
            setEvents={setEvents}
            setPyqUploads={setPyqUploads}
          />
        )}
      </main>
    </div>
  );
}

// ---------- ERROR BOUNDARY ----------
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("Render error:", error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding: 24, fontFamily: 'monospace', whiteSpace: 'pre-wrap', color: '#FF6B5B', background:'#1E1B4B', minHeight:'100vh'}}>
          <h2>Something went wrong</h2>
          <p>{String(this.state.error && this.state.error.message)}</p>
          <pre>{String(this.state.error && this.state.error.stack)}</pre>
        </div>
      );
    }
    return this.props.children;
  }
}

window.addEventListener('error', (e) => {
  console.error('Global error:', e.error || e.message, e.filename, e.lineno, e.colno);
});

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><ToastProvider><App /></ToastProvider></ErrorBoundary>);
</script>
