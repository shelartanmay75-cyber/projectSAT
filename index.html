<script>
  // Without this, Tailwind's `dark:` utilities follow the OS/browser
  // color-scheme (prefers-color-scheme) instead of the app's own light/dark
  // toggle. That mismatch is what causes text to look wrong after switching
  // the in-app theme: if the OS is set to dark but the app is toggled to
  // light, `dark:` classes still apply (e.g. white text) on top of the now
  // light background. Switching to the 'class' strategy makes all `dark:`
  // classes key off the `dark` class on <html>, which is what the app's
  // theme toggle actually sets — keeping it in sync everywhere, including
  // Study Material.
  tailwind.config = { darkMode: 'class' };
</script>

  .scrollbar-none{-ms-overflow-style:none;scrollbar-width:none;}

  /* ============ DARK MODE ============ */
  html.dark{ --ink:#F4F2FF; --paper:#13112E; --line:#2E2A5C; --card:#211D4F; --surface-soft:rgba(244,242,255,0.035); --checkbox-bg:rgba(244,242,255,0.06); }
  html.dark body{ background:var(--paper); }

  /* Glass panels / cards */
  html.dark .glass{ background:rgba(33,29,79,0.65); border:1px solid rgba(255,255,255,0.06); }

  /* White surfaces -> dark card surfaces */
  html.dark .bg-white{ background-color:var(--card) !important; }
  html.dark .bg-white\/90{ background-color:rgba(33,29,79,0.9) !important; }
  html.dark .hover\:bg-white\/90:hover{ background-color:rgba(33,29,79,0.9) !important; }

  /* Primary ink text -> light text */
  html.dark [class*="text-[#1E1B4B]"]{ color:var(--ink) !important; }
  html.dark [class*="bg-[#1E1B4B]"]{ background-color:var(--card) !important; }
  html.dark [class*="border-[#1E1B4B]"]{ border-color:var(--line) !important; }

  /* Lines / borders driven by CSS var already adapt via --line override above */
  html.dark [class*="border-[var(--line)]"]{ border-color:var(--line) !important; }

  /* Subtle hover/bg tints based on ink color */
  html.dark [class*="hover:bg-[#1E1B4B]"]:hover{ background-color:rgba(244,242,255,0.08) !important; }

  html.dark [class*="bg-[#1E1B4B]/10"]{ background-color:rgba(244,242,255,0.1) !important; }

  /* Inputs and selects */
  html.dark input, html.dark select, html.dark textarea{ background-color:rgba(255,255,255,0.04); color:var(--ink); }
  html.dark input::placeholder, html.dark textarea::placeholder{ color:rgba(244,242,255,0.3); }
  /* The dropdown list (<option>s) is rendered by the browser using its own
     background, not the select's transparent one — without this, dark-mode
     text color (light) sits on the browser's default white list, making the
     options invisible. Force an explicit dark background + light text, and
     also hint the browser via color-scheme so native popups match. */
  html.dark select{ background-color:var(--card); color-scheme:dark; }
  html.dark option{ background-color:var(--card); color:var(--ink); }

  /* Login / profile-setup screen is always on a dark gradient background

  select.bg-white\/10{ color-scheme:dark; color:#fff; }
  select.bg-white\/10 option{ background-color:#1E1B4B; color:#fff; }
  /* The dropdown list (<option>s) is rendered by the browser using its own
     background, not the select's transparent one — without this, dark-mode
     text color (light) sits on the browser's default white list, making the
     options invisible. Force an explicit dark background + light text. */
  html.dark select{ background-color:var(--card); }
  html.dark option{ background-color:var(--card); color:var(--ink); }

<script>
  // Apply saved theme class to <html> before paint to avoid flash
  (function(){
    try {
      var saved = localStorage.getItem('pathway-theme');
      if (saved === 'dark') document.documentElement.classList.add('dark');
    } catch(e) {}
  })();

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

// ---------- CUSTOM HOOKS & HELPERS ----------
function usePersistedState(key, defaultValue) {
  const [state, setState] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : defaultValue;
    } catch { return defaultValue; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(state)); } catch {}
  }, [state, key]);
  return [state, setState];
}

function getInitials(name) {
  if (!name) return "";
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) {
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }
  return parts[0].slice(0, 2).toUpperCase();
}

// ---------- TOAST SYSTEM ----------
const ToastContext = React.createContext();

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  
  const showToast = (message, type = "info") => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => {
      setToasts(prev => prev.filter(t => t.id !== id));
    }, 3000);
  };
  
  return (
    <ToastContext.Provider value={{ showToast }}>
      {children}
      <ToastContainer toasts={toasts} setToasts={setToasts} />
    </ToastContext.Provider>
  );
}

function useToast() {
  return React.useContext(ToastContext);
}

function ToastContainer({ toasts, setToasts }) {
  const colors = {
    success: "#7C9885",
    error: "#FF6B5B",
    info: "#5B8DEF",
    warning: "#F4A259"
  };
  
  return (
    <div className="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none">
      {toasts.map(t => (
        <div
          key={t.id}
          className="bg-[#1E1B4B] text-white px-4 py-3 rounded-2xl shadow-2xl flex items-center gap-2.5 border border-white/10 float-in text-sm font-medium pointer-events-auto transition-opacity duration-300"
          style={{ animation: "float-in 0.3s ease-out" }}
        >
          <span className="w-2.5 h-2.5 rounded-full pulse" style={{ backgroundColor: colors[t.type] || colors.info }}></span>
          <span>{t.message}</span>
          <button
            onClick={() => setToasts(prev => prev.filter(it => it.id !== t.id))}
            className="ml-2 text-white/50 hover:text-white"
          >
            <I name="x" size={14} />
          </button>
        </div>
      ))}
    </div>
  );
}

// ---------- GOOGLE OAUTH CONFIG ----------
// SETUP: Replace with your Google OAuth Client ID from 
// https://console.cloud.google.com/apis/credentials
// Add your hosting domain to "Authorized JavaScript origins".
// For local testing, add http://localhost to origins.
const GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com";

// Decode a JWT credential returned by Google Identity Services (no verification —
// this is fine for client-side display, but a real backend should verify the token).
function decodeJwt(token) {
  try {
    const payload = token.split('.')[1];
    const json = decodeURIComponent(atob(payload.replace(/-/g,'+').replace(/_/g,'/')).split('').map(c =>
      '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));
    return JSON.parse(json);
  } catch (e) {
    console.error("Failed to decode JWT:", e);
    return null;
  }
}

function AddAssignmentModal({ onClose, onSave }) {

  const [desc, setDesc] = useState("");
  const [due, setDue] = useState("");
  const [priority, setPriority] = useState("Medium");
  const [status, setStatus] = useState("Pending");

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!title.trim() || !due) return;
    onSave({
      id: Date.now(),
      title: title.trim(),
      subject,
      desc: desc.trim(),
      due,
      priority,
      status
    });
  };

  const selectedSubj = subjectById(subject);

  return (
    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>

              Save Assignment
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

  const [detailItem,  setDetailItem]  = useState(null);   // assignment currently shown in modal
  const [attachments, setAttachments] = useState({});      // { [assignmentId]: { name, size } }
  const fileInputRef = useRef(null);

  const toggleSubject = (id) => setOpenSubject(prev => prev === id ? null : id);
  const toggleCheck   = (aId, e) => { e.stopPropagation(); setChecked(prev => ({ ...prev, [aId]: !prev[aId] })); };
  const openDetails   = (a, e) => { if (e) e.stopPropagation(); setDetailItem(a); };

  const handleFileChosen = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file || !detailItem) return;
    const sizeKB = file.size / 1024;
    const sizeLabel = sizeKB > 1024 ? `${(sizeKB/1024).toFixed(1)} MB` : `${Math.max(1,Math.round(sizeKB))} KB`;
    setAttachments(prev => ({ ...prev, [detailItem.id]: { name: file.name, size: sizeLabel } }));
    e.target.value = "";
  };

  const removeAttachment = (aId) => setAttachments(prev => { const next = { ...prev }; delete next[aId]; return next; });

  const doneFor   = (sid) => (ASSIGNMENTS_DATA[sid]||[]).filter(a => checked[a.id]).length;
  const totalAll  = Object.values(ASSIGNMENTS_DATA).flat().length;
  const doneAll   = Object.values(checked).filter(Boolean).length;

  return (
    <div className="space-y-4 max-w-3xl mx-auto">
      {/* Hidden file input shared by all "Attach" buttons */}
      <input ref={fileInputRef} type="file" accept=".pdf,.doc,.docx,.txt,image/*" className="hidden" onChange={handleFileChosen} />

      {/* Overall counter */}

}

function AddCAModal({ defaultSubject, initialValues, onClose, onSave }) {
  const [subject, setSubject] = useState(initialValues ? initialValues.subject : defaultSubject);
  const isCustomTitle = initialValues && !["CA-1", "CA-2", "CA-3", "CA-4"].includes(initialValues.name);
  const [caName, setCaName] = useState(initialValues ? (isCustomTitle ? "custom" : initialValues.name) : "CA-2");
  const [customName, setCustomName] = useState(initialValues && isCustomTitle ? initialValues.name : "");
  const [date, setDate] = useState(initialValues ? initialValues.date : "");
  const [time, setTime] = useState(initialValues ? initialValues.time : "10:00 AM - 11:00 AM");
  const [venue, setVenue] = useState(initialValues ? initialValues.venue : "Room 204");
  const [marks, setMarks] = useState(initialValues ? initialValues.marks : 20);
  const [topicsStr, setTopicsStr] = useState(initialValues ? initialValues.topics.join(", ") : "");
  const [syllabus, setSyllabus] = useState(initialValues ? initialValues.syllabus : "");

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!date || !time || !venue || !topicsStr || !syllabus) {
      alert("Please fill all required fields!");
      return;
    }
    const finalName = caName === "custom" ? (customName || "Custom Assessment") : caName;
    const topics = topicsStr.split(",").map(t => t.trim()).filter(Boolean);
    
    // Generate simple ID if new, otherwise preserve existing
    const id = initialValues ? initialValues.id : `${subject}-${finalName.toLowerCase().replace(/[^a-z0-9]/g, "-")}-${Date.now()}`;

    // Determine status based on date
    const days = daysUntil(date);
    const status = days < 0 ? "Completed" : "Upcoming";

    onSave({
      id,
      name: finalName,
      subject,
      type: "ca",
      date,
      time,
      venue,
      marks: Number(marks) || 20,
      topics,
      syllabus,
      status
    });
  };

  const selectedSubj = subjectById(subject);

  return (
    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white rounded-3xl max-w-lg w-full p-6 shadow-2xl relative float-in overflow-hidden max-h-[95vh] flex flex-col border border-[var(--line)]" onClick={e=>e.stopPropagation()}>
        {/* Top visual banner */}
        <div className="absolute top-0 left-0 right-0 h-2" style={{ background: selectedSubj ? selectedSubj.color : "#FF6B5B" }}></div>

        {/* Header */}
        <div className="flex items-start justify-between mb-4 pt-2">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0 bg-[#FF6B5B]/10 text-[#FF6B5B]">
              <I name="plus-circle" size={22} />
            </div>
            <div>
              <h2 className="font-display text-xl font-bold text-[#1E1B4B]">Schedule New CA</h2>
              <p className="text-xs text-[#1E1B4B]/40 mt-0.5">Add upcoming CA details announced by teacher</p>
            </div>
          </div>
          <button onClick={onClose} className="text-[#1E1B4B]/30 hover:text-[#1E1B4B] w-8 h-8 rounded-full hover:bg-[#1E1B4B]/5 flex items-center justify-center transition-colors">
            <I name="x" size={20} />
          </button>

function CAModule({ cas, setCas }) {
  const [activeSubject, setActiveSubject] = useState("math");
  const [selectedExam, setSelectedExam] = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);
  const [editCaData, setEditCaData] = useState(null);

  // Filter exams for active subject in chronological order
  const subjectExams = useMemo(() => {
    return cas
      .filter(ca => ca.subject === activeSubject)
      .sort((a, b) => new Date(a.date) - new Date(b.date));
  }, [activeSubject, cas]);

  const activeSubj = subjectById(activeSubject);

  const deleteCA = (id, e) => {
    e.stopPropagation();
    if (confirm("Are you sure you want to delete this CA?")) {
      setCas(cas.filter(ca => ca.id !== id));
      if (selectedExam && selectedExam.id === id) {
        setSelectedExam(null);
      }
    }
  };

  return (
    <div className="flex flex-col lg:flex-row gap-6 float-in">
      {/* Left Panel: Subject Selector */}
      <div className="w-full lg:w-72 shrink-0 space-y-3">
        <h3 className="font-display font-semibold text-[#1E1B4B] text-base px-1">Subjects</h3>
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-3">
          {SUBJECTS.map(s => {
            const subjectExamsList = cas.filter(ca => ca.subject === s.id);
            const completedCount = subjectExamsList.filter(ca => ca.status === "Completed" || daysUntil(ca.date) < 0).length;
            const totalCount = subjectExamsList.length;
            const isActive = activeSubject === s.id;

            return (
              <div
                key={s.id}
                onClick={() => setActiveSubject(s.id)}
                className={`glass rounded-2xl p-4 shadow-sm hover:shadow-md transition-all cursor-pointer border-2 ${isActive ? "border-[#FF6B5B]" : "border-transparent"}`}
              >
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" style={{ background: `${s.color}1A`, color: s.color }}>
                    <I name={s.icon} size={18} />
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="font-display font-semibold text-[#1E1B4B] text-sm truncate">{s.name}</p>
                    <p className="text-xs text-[#1E1B4B]/40 mt-0.5">{completedCount} of {totalCount} completed</p>
                  </div>
                </div>
                {/* Micro Progress Bar */}
                <div className="mt-3 h-1.5 bg-[#1E1B4B]/5 rounded-full overflow-hidden">
                  <div className="h-full rounded-full transition-all duration-500" style={{ width: totalCount > 0 ? `${(completedCount / totalCount) * 100}%` : "0%", background: s.color }}></div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Right Panel: Exam Sequence Timeline */}
      <div className="flex-1 space-y-6">
        <div className="glass rounded-2xl p-5 shadow-sm flex flex-col sm:flex-row sm:items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <div className="w-12 h-12 rounded-xl flex items-center justify-center" style={{ background: `${activeSubj.color}1A`, color: activeSubj.color }}>
              <I name={activeSubj.icon} size={22} />
            </div>
            <div>
              <h2 className="font-display text-xl font-bold text-[#1E1B4B]">{activeSubj.name}</h2>
              <p className="text-xs text-[#1E1B4B]/40 mt-0.5">Continuous Assessments (CAs)</p>
            </div>
          </div>
          <button
            onClick={() => setShowAddModal(true)}
            className="px-4 py-2.5 rounded-xl bg-[#FF6B5B] hover:bg-[#ff5a48] text-white text-sm font-semibold flex items-center justify-center gap-2 shadow-md transition-all shrink-0 active:scale-[0.98]"
          >
            <I name="plus" size={16} /> Add CA
          </button>
        </div>

        {/* Timeline Pipeline */}
        {subjectExams.length === 0 ? (
          <div className="glass rounded-2xl p-8 shadow-sm text-center border-2 border-dashed border-[var(--line)]">
            <I name="file-check-2" size={36} className="text-[#1E1B4B]/20 mx-auto mb-3" />
            <p className="text-sm font-medium text-[#1E1B4B]/60">No CAs added for this subject yet.</p>
            <p className="text-xs text-[#1E1B4B]/40 mt-1 mb-4">Click "Add CA" to schedule an upcoming CA announced by the teacher.</p>
            <button
              onClick={() => setShowAddModal(true)}
              className="px-4 py-2 rounded-xl bg-[#1E1B4B]/5 hover:bg-[#1E1B4B]/10 text-[#1E1B4B] text-xs font-semibold inline-flex items-center gap-1.5 transition-colors"
            >
              <I name="plus" size={14} /> Schedule Now
            </button>
          </div>
        ) : (
          <div className="relative pl-6 sm:pl-8 border-l-2 border-[#1E1B4B]/10 space-y-6 py-2 ml-4">
            {subjectExams.map((ca, idx) => {
              const days = daysUntil(ca.date);
              const isCompleted = ca.status === "Completed" || days < 0;

              // Status Badge logic
              let statusText = "";
              let statusClass = "";
              if (isCompleted) {
                statusText = "Completed";
                statusClass = "bg-[#7C9885]/15 text-[#7C9885]";
              } else {
                if (days === 0) {
                  statusText = "Today";
                  statusClass = "bg-[#FF6B5B]/15 text-[#FF6B5B] pulse";
                } else if (days === 1) {
                  statusText = "Tomorrow";
                  statusClass = "bg-[#FF6B5B]/15 text-[#FF6B5B]";
                } else {
                  statusText = `${days}d left`;
                  statusClass = "bg-[#F4A259]/15 text-[#F4A259]";
                }
              }

              return (
                <div key={ca.id} className="relative group">
                  {/* Timeline Marker Dot */}
                  <div
                    className={`absolute -left-[31px] sm:-left-[39px] top-4 w-4 h-4 rounded-full border-4 flex items-center justify-center bg-white transition-all duration-300 z-10
                      ${isCompleted ? "border-[#7C9885] bg-[#7C9885]" : "border-[#1E1B4B]/20 group-hover:border-[#FF6B5B]"}`}
                  >
                    {isCompleted && <div className="w-1.5 h-1.5 rounded-full bg-white"></div>}
                  </div>

                  {/* Exam Card */}
                  <div
                    onClick={() => setSelectedExam(ca)}
                    className={`glass rounded-2xl p-5 shadow-sm hover:shadow-md transition-all cursor-pointer border-2 hover:-translate-y-0.5 relative overflow-hidden
                      ${isCompleted ? "border-transparent opacity-85" : "border-[#1E1B4B]/5 hover:border-[#FF6B5B]"}`}
                  >
                    {/* Top color ribbon */}
                    <div className="absolute top-0 left-0 right-0 h-1" style={{ background: activeSubj.color }}></div>

                    <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-3">
                      <div className="flex items-center gap-2">
                        <span className="text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider bg-[#F4A259]/15 text-[#F4A259]">
                          CA
                        </span>
                        <h3 className="font-display font-semibold text-base text-[#1E1B4B]">{ca.name}</h3>
                      </div>
                      <div className="flex items-center gap-3">
                        <span className={`text-xs font-semibold px-3 py-1 rounded-full w-max ${statusClass}`}>
                          {statusText}
                        </span>
                        <button
                          onClick={(e) => deleteCA(ca.id, e)}
                          className="w-7 h-7 rounded-lg hover:bg-red-500/10 text-[#1E1B4B]/30 hover:text-red-500 flex items-center justify-center transition-colors shrink-0"
                          title="Delete CA"
                        >
                          <I name="x" size={14} />
                        </button>
                      </div>
                    </div>

                    <div className="flex flex-wrap items-center gap-x-4 gap-y-2 text-sm text-[#1E1B4B]/50 mb-3">
                      <span className="flex items-center gap-1.5"><I name="calendar" size={13}/> {fmtDate(ca.date)}</span>
                      <span className="flex items-center gap-1.5"><I name="clock" size={13}/> {ca.time}</span>
                      <span className="flex items-center gap-1.5"><I name="map-pin" size={13}/> {ca.venue}</span>
                      <span className="flex items-center gap-1.5 font-medium text-[#1E1B4B]/70"><I name="trophy" size={13}/> {ca.marks} Marks</span>
                    </div>

                    <div>
                      <p className="text-xs font-semibold text-[#1E1B4B]/30 mb-2 uppercase tracking-wider">Key Topics</p>
                      <div className="flex flex-wrap gap-1.5">
                        {ca.topics.map(t => (
                          <span key={t} className="text-xs px-2.5 py-1 rounded-lg bg-[#1E1B4B]/5 text-[#1E1B4B]/60">{t}</span>
                        ))}
                      </div>
                    </div>

                    <div className="mt-4 pt-3 border-t border-[var(--line)] flex items-center justify-between text-xs text-[#1E1B4B]/40">
                      <span className="flex items-center gap-1.5">
                        <I name="bell-ring" size={13} /> Reminders active
                      </span>
                      <span className="text-[#FF6B5B] font-semibold group-hover:underline flex items-center gap-1">
                        View Syllabus & Details <I name="arrow-right" size={12} />
                      </span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Interactive Detail Modal */}
      {selectedExam && (
        <ExamDetailModal
          exam={selectedExam}
          subject={subjectById(selectedExam.subject)}
          onClose={() => setSelectedExam(null)}
          onDelete={(id, e) => {
            deleteCA(id, e);
          }}
          onEdit={() => {
            setEditCaData(selectedExam);
            setSelectedExam(null);
          }}
        />
      )}

      {/* Add / Edit CA Modal */}
      {(showAddModal || editCaData) && (
        <AddCAModal
          defaultSubject={activeSubject}
          initialValues={editCaData}
          onClose={() => {
            setShowAddModal(false);
            setEditCaData(null);
          }}
          onSave={(ca) => {
            if (editCaData) {
              setCas(cas.map(c => c.id === editCaData.id ? ca : c));
            } else {
              setCas([...cas, ca]);
            }
            setShowAddModal(false);
            setEditCaData(null);
          }}
        />
      )}
    </div>
  );
}

function getEmbedUrl(url) {
  if (!url) return "";
  if (url.includes("youtube.com/embed/")) return url;
  
  // Standard video url
  let watchMatch = url.match(/[?&]v=([^&#\?]+)/);
  if (watchMatch && watchMatch[1]) {
    return `https://www.youtube.com/embed/${watchMatch[1]}`;
  }
  
  // Short share url
  if (url.includes("youtu.be/")) {
    let parts = url.split("youtu.be/");
    if (parts[1]) {
      let videoId = parts[1].split(/[?&#]/)[0];
      return `https://www.youtube.com/embed/${videoId}`;
    }
  }
  
  // Playlist url
  let listMatch = url.match(/[?&]list=([^&#\?]+)/);
  if (listMatch && listMatch[1]) {
    return `https://www.youtube.com/embed/videoseries?list=${listMatch[1]}`;
  }
  
  return url;
}

const MAX_NOTE_FILE_SIZE = 5 * 1024 * 1024; // 5MB — local browser storage limit

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function formatFileSize(bytes) {
  if (!bytes && bytes !== 0) return "";
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

function UploadNoteModal({ onClose, onSave, activeSubject }) {
  const [title, setTitle] = useState("");
  const [desc, setDesc] = useState("");
  const [file, setFile] = useState(null);
  const [error, setError] = useState("");
  const [saving, setSaving] = useState(false);

  const handleFileChange = (e) => {
    const f = e.target.files && e.target.files[0];
    setError("");
    if (f && f.size > MAX_NOTE_FILE_SIZE) {
      setError("File is too large. Please choose a file under 5 MB.");
      setFile(null);
      e.target.value = "";
      return;
    }
    setFile(f || null);
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!title.trim()) return;
    setSaving(true);
    try {
      let dataUrl = "", fileName = "", fileType = "", fileSize = 0;
      if (file) {
        dataUrl = await fileToDataUrl(file);
        fileName = file.name;
        fileType = file.type;
        fileSize = file.size;
      }
      onSave({
        title: title.trim(),
        desc: desc.trim(),
        subject: activeSubject,
        fileName,
        fileType,
        fileSize,
        dataUrl,
      });
    } catch (err) {
      setError("Couldn't read that file. Please try again.");
      setSaving(false);
    }
  };

function CalendarModule({ cas = [], assignments = [], events = [], setEvents }) {
  const { showToast } = useToast();
  const [view, setView] = useState("month");
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [selectedDay, setSelectedDay] = useState(null);
  const [showAddEvent, setShowAddEvent] = useState(false);
  const [initialAddDate, setInitialAddDate] = useState("");

  const todayDate = new Date();
  const [viewYear, setViewYear] = useState(todayDate.getFullYear());
  const [viewMonth, setViewMonth] = useState(todayDate.getMonth()); // 0-11

  const monthNames = [
    "January", "February", "March", "April", "May", "June",
    "July", "August", "September", "October", "November", "December"
  ];

  const parseLocalDate = (dateStr) => {
    if (!dateStr) return null;
    const parts = dateStr.split('-');
    if (parts.length === 3) {
      return {
        year: parseInt(parts[0], 10),
        month: parseInt(parts[1], 10) - 1, // 0-indexed
        day: parseInt(parts[2], 10)
      };
    }
    const dObj = new Date(dateStr);
    return {
      year: dObj.getFullYear(),
      month: dObj.getMonth(),
      day: dObj.getDate()
    };
  };

  const allEvents = [
    ...assignments.map(a => ({
      id: `assignment-${a.id}`,
      date: a.due,
      title: a.title,
      type: "assignment",
      color: "#FF6B5B",
      subject: subjectById(a.subject)?.name || a.subject,
      time: "",
      venue: ""
    })),
    ...cas.map(c => ({
      id: `ca-${c.id}`,
      date: c.date,
      title: `${c.name} — ${subjectById(c.subject)?.name || c.subject}`,
      type: c.type === "ese" ? "exam" : c.type === "mt" ? "exam" : "ca",
      color: c.type === "ese" ? "#9B6BFF" : c.type === "mt" ? "#5B8DEF" : "#F4A259",
      subject: subjectById(c.subject)?.name || c.subject,
      time: c.time || "",
      venue: c.venue || ""
    })),
    ...events.map(e => ({
      id: `custom-${e.id}`,
      date: e.date,
      title: e.title,
      type: e.type || "personal",
      color: e.color || "#7C9885",
      subject: e.subject || "Personal",
      time: e.time || "",
      venue: e.venue || ""
    }))
  ];

  const handlePrevMonth = () => {
    if (viewMonth === 0) {
      setViewMonth(11);
      setViewYear(viewYear - 1);
    } else {
      setViewMonth(viewMonth - 1);
    }
  };

  const handleNextMonth = () => {
    if (viewMonth === 11) {
      setViewMonth(0);
      setViewYear(viewYear + 1);
    } else {
      setViewMonth(viewMonth + 1);
    }
  };

  const handleGoToToday = () => {
    const now = new Date();
    setViewMonth(now.getMonth());
    setViewYear(now.getFullYear());
  };

  const isToday = (day) => {
    const now = new Date();
    return day === now.getDate() && viewMonth === now.getMonth() && viewYear === now.getFullYear();
  };

  const getEventsForDay = (d) => {
    if (!d) return [];
    return allEvents.filter(e => {
      const parsed = parseLocalDate(e.date);
      if (!parsed) return false;
      return parsed.year === viewYear && parsed.month === viewMonth && parsed.day === d;
    });
  };

  const handleDeleteEvent = (eventToDelete) => {
    if (confirm("Are you sure you want to delete this event?")) {
      setEvents(events.filter(e => e.id !== eventToDelete.id));
      showToast("Event deleted successfully!", "success");
    }
  };

  const firstDayOfMonth = new Date(viewYear, viewMonth, 1);
  const startOffset = firstDayOfMonth.getDay(); 
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  return (
    <div>
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div className="flex items-center gap-2">
          {["Month", "List View"].map(v => {
            const val = v === "Month" ? "month" : "list";
            return (
              <button key={v} onClick={() => setView(val)}
                className={`px-4 py-2 rounded-xl text-sm font-medium transition-all ${view===val ? "bg-[#1E1B4B] dark:bg-white text-white dark:text-[#1E1B4B]" : "bg-white dark:bg-white/5 text-[#1E1B4B]/60 dark:text-white/60 hover:bg-[#1E1B4B]/5 dark:hover:bg-white/10"}`}>
                {v}
              </button>
            );
          })}
        </div>

        <div className="flex items-center gap-3">
          <button onClick={handlePrevMonth} className="w-9 h-9 rounded-lg bg-white dark:bg-white/5 border border-[var(--line)] flex items-center justify-center text-[#1E1B4B]/50 dark:text-white/50 hover:bg-[#1E1B4B]/5 dark:hover:bg-white/10 transition-colors">
            <I name="chevron-left" size={16}/>
          </button>
          <span onClick={handleGoToToday} className="font-display font-semibold text-[#1E1B4B] dark:text-white cursor-pointer hover:text-[#5B8DEF] transition-colors min-w-[110px] text-center select-none">
            {monthNames[viewMonth]} {viewYear}
          </span>
          <button onClick={handleNextMonth} className="w-9 h-9 rounded-lg bg-white dark:bg-white/5 border border-[var(--line)] flex items-center justify-center text-[#1E1B4B]/50 dark:text-white/50 hover:bg-[#1E1B4B]/5 dark:hover:bg-white/10 transition-colors">
            <I name="chevron-right" size={16}/>
          </button>
        </div>

        <button
          onClick={() => {
            const now = new Date();
            const formattedDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            setInitialAddDate(formattedDate);
            setShowAddEvent(true);
          }}
          className="px-4 py-2 rounded-xl text-sm font-semibold text-white bg-[#5B8DEF] hover:bg-[#4a72cc] flex items-center gap-2 transition-all shadow-md active:scale-95"
        >
          <I name="plus" size={16}/> Add Event
        </button>
      </div>

      <div className="flex flex-wrap gap-4 mb-4 text-xs text-[#1E1B4B]/60 dark:text-white/50">
        {[["Assignment Deadlines","#FF6B5B"],["CAs","#F4A259"],["Exams","#5B8DEF"],["Study/Personal","#7C9885"]].map(([l,c])=>(
          <span key={l} className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{background:c}}></span>{l}</span>
        ))}
      </div>

      {view === "month" && (
        <div className="glass rounded-3xl p-4 shadow-sm border border-[var(--line)]">
          <div className="grid grid-cols-7 gap-2 mb-2">
            {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => (
              <div key={d} className="text-center text-xs font-semibold text-[#1E1B4B]/40 dark:text-white/40 py-2">{d}</div>
            ))}
          </div>
          <div className="grid grid-cols-7 gap-2">
            {cells.map((d, i) => {
              const dayEvents = d ? getEventsForDay(d) : [];
              const isCurrentToday = d && isToday(d);
              return (
                <div
                  key={i}
                  onClick={() => d && setSelectedDay({ day: d, month: viewMonth, year: viewYear })}
                  className={`min-h-[95px] rounded-xl p-1.5 transition-all flex flex-col justify-between border ${
                    d 
                      ? "bg-white/50 hover:bg-white/80 dark:bg-white/5 dark:hover:bg-white/10 cursor-pointer border-[var(--line)]" 
                      : "opacity-0 pointer-events-none border-transparent"
                  } ${isCurrentToday ? "ring-2 ring-[#FF6B5B] border-[#FF6B5B]" : ""}`}
                >
                  <div>
                    <div className="flex items-center justify-between mb-1">
                      <span className={`text-xs font-semibold ${isCurrentToday ? "text-[#FF6B5B]" : "text-[#1E1B4B]/50 dark:text-white/40"}`}>
                        {d}
                      </span>
                      {isCurrentToday && (
                        <span className="w-1.5 h-1.5 rounded-full bg-[#FF6B5B]"></span>
                      )}
                    </div>
                    <div className="space-y-1">
                      {dayEvents.slice(0, 2).map((e, idx) => (
                        <div
                          key={idx}
                          onClick={(ev) => {
                            ev.stopPropagation();
                            setSelectedEvent(e);
                          }}
                          className="text-[9px] px-1.5 py-0.5 rounded truncate font-medium text-white shadow-sm hover:scale-[1.02] transition-transform"
                          style={{ backgroundColor: e.color }}
                          title={e.title}
                        >
                          {e.title}
                        </div>
                      ))}
                      {dayEvents.length > 2 && (
                        <p className="text-[9px] text-[#1E1B4B]/40 dark:text-white/40 font-medium pl-1">
                          +{dayEvents.length - 2} more
                        </p>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {view === "list" && (
        <div className="glass rounded-3xl p-6 shadow-sm border border-[var(--line)]">
          <div className="flex items-center gap-2 mb-4">
            <I name="calendar" size={18} className="text-[#5B8DEF]" />
            <h4 className="font-display font-semibold text-sm text-[#1E1B4B] dark:text-white">Events in {monthNames[viewMonth]} {viewYear}</h4>
          </div>
          {allEvents.filter(e => {
            const parsed = parseLocalDate(e.date);
            return parsed && parsed.year === viewYear && parsed.month === viewMonth;
          }).length === 0 ? (
            <div className="text-center py-8">
              <I name="calendar" size={36} className="text-[#1E1B4B]/20 dark:text-white/20 mx-auto mb-3"/>
              <p className="text-sm text-[#1E1B4B]/50 dark:text-white/50">No events scheduled for this month.</p>
            </div>
          ) : (
            <div className="space-y-2 max-w-2xl mx-auto text-left">
              {allEvents
                .filter(e => {
                  const parsed = parseLocalDate(e.date);
                  return parsed && parsed.year === viewYear && parsed.month === viewMonth;
                })
                .sort((a, b) => new Date(a.date) - new Date(b.date))
                .map((e, i) => (
                  <div key={i} onClick={() => setSelectedEvent(e)} className="flex items-center gap-3 p-3 bg-white/60 dark:bg-white/5 rounded-xl cursor-pointer hover:bg-white dark:hover:bg-white/10 transition-colors border border-[var(--line)]">
                    <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ background: e.color }}></span>
                    <span className="text-xs font-semibold uppercase tracking-wider text-[9px] px-1.5 py-0.5 rounded text-white shrink-0" style={{ backgroundColor: e.color }}>{e.type}</span>
                    <span className="text-sm font-medium text-[#1E1B4B] dark:text-white flex-1 truncate">{e.title}</span>
                    <span className="text-xs text-[#1E1B4B]/40 dark:text-white/40 shrink-0">{fmtDate(e.date)}</span>
                  </div>
                ))}
            </div>
          )}
        </div>
      )}

      {selectedEvent && (
        <div className="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setSelectedEvent(null)}>
          <div className="bg-white dark:bg-[#1E1B4B] rounded-3xl max-w-md w-full p-6 shadow-2xl border border-[var(--line)]" onClick={e=>e.stopPropagation()}>
            <div className="w-10 h-10 rounded-xl flex items-center justify-center mb-3" style={{background:`${selectedEvent.color}1A`, color:selectedEvent.color}}>
              <I name={selectedEvent.type==='assignment'?'book':selectedEvent.type==='ca'?'calendar':selectedEvent.type==='exam'?'award':'user'} size={18}/>
            </div>
            <h3 className="font-display font-semibold text-[#1E1B4B] dark:text-white mb-1">{selectedEvent.title}</h3>
            <p className="text-sm text-[#1E1B4B]/50 dark:text-white/50 mb-3">{selectedEvent.subject}</p>
            <div className="text-sm text-[#1E1B4B]/60 dark:text-white/60 space-y-1.5 text-left border-t border-b border-[var(--line)] py-3">
              <p className="flex items-center gap-2"><I name="calendar" size={14}/> {fmtDate(selectedEvent.date)}</p>
              {selectedEvent.time && <p className="flex items-center gap-2"><I name="clock" size={14}/> {selectedEvent.time}</p>}
              {selectedEvent.venue && <p className="flex items-center gap-2"><I name="map-pin" size={14}/> {selectedEvent.venue}</p>}
            </div>
            <button onClick={() => setSelectedEvent(null)} className="mt-4 w-full py-2.5 rounded-xl bg-[#1E1B4B] dark:bg-white text-white dark:text-[#1E1B4B] text-sm font-semibold transition-transform hover:scale-[0.98]">Close</button>
          </div>
        </div>
      )}

      {selectedDay && (
        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 flex items-center justify-end p-0 md:p-4 animate-fadeIn" onClick={() => setSelectedDay(null)}>
          <div 
            className="bg-white dark:bg-[#1E1B4B] h-full md:h-[calc(100vh-2rem)] w-full max-w-md p-6 shadow-2xl flex flex-col justify-between md:rounded-3xl border border-[var(--line)] float-in" 
            onClick={e => e.stopPropagation()}
          >
            <div>
              <div className="flex items-center justify-between pb-4 border-b border-[var(--line)] mb-4">
                <div>
                  <h3 className="font-display font-bold text-lg text-[#1E1B4B] dark:text-white">Daily Schedule</h3>
                  <p className="text-xs text-[#1E1B4B]/40 dark:text-white/40">{monthNames[selectedDay.month]} {selectedDay.day}, {selectedDay.year}</p>
                </div>
                <button onClick={() => setSelectedDay(null)} className="text-[#1E1B4B]/30 hover:text-[#1E1B4B] dark:text-white/30 dark:hover:text-white w-8 h-8 rounded-full hover:bg-[#1E1B4B]/5 dark:hover:bg-white/5 flex items-center justify-center transition-colors">
                  <I name="x" size={20} />
                </button>
              </div>

              <div className="space-y-3 overflow-y-auto max-h-[60vh] pr-1">
                {getEventsForDay(selectedDay.day).length === 0 ? (
                  <div className="text-center py-8">
                    <I name="calendar" size={32} className="text-[#1E1B4B]/20 dark:text-white/20 mx-auto mb-2" />
                    <p className="text-sm text-[#1E1B4B]/40 dark:text-white/40">No events scheduled for this day.</p>
                  </div>
                ) : (
                  getEventsForDay(selectedDay.day).map((e, idx) => {
                    const isCustom = e.id && e.id.toString().startsWith("custom-");
                    return (
                      <div key={idx} className="glass rounded-xl p-3 border border-[var(--line)] flex items-start gap-3 hover:bg-white/60 dark:hover:bg-white/10 transition-colors">
                        <span className="w-2.5 h-2.5 rounded-full mt-1.5 shrink-0" style={{ backgroundColor: e.color }}></span>
                        <div className="flex-1 min-w-0 text-left">
                          <div className="flex items-center gap-1.5 flex-wrap">
                            <span className="text-xs font-semibold uppercase tracking-wider text-[9px] px-1.5 py-0.5 rounded text-white" style={{ backgroundColor: e.color }}>
                              {e.type}
                            </span>
                            {e.subject && <span className="text-xs text-[#1E1B4B]/40 dark:text-white/40 truncate">{e.subject}</span>}
                          </div>
                          <p className="text-sm font-semibold text-[#1E1B4B] dark:text-white mt-1">{e.title}</p>
                          <div className="flex gap-3 text-xs text-[#1E1B4B]/50 dark:text-white/50 mt-1 flex-wrap">
                            {e.time && <span className="flex items-center gap-1"><I name="clock" size={12}/>{e.time}</span>}
                            {e.venue && <span className="flex items-center gap-1"><I name="map-pin" size={12}/>{e.venue}</span>}
                          </div>
                        </div>
                        {isCustom && (
                          <button 
                            onClick={(ev) => {
                              ev.stopPropagation();
                              const realId = parseInt(e.id.replace("custom-", ""), 10);
                              handleDeleteEvent({ id: realId });
                            }}
                            className="text-[#1E1B4B]/30 hover:text-red-500 p-1.5 rounded hover:bg-red-500/10 transition-colors"
                            title="Delete event"
                          >
                            <I name="x" size={14} />
                          </button>
                        )}
                      </div>
                    );
                  })
                )}
              </div>
            </div>

            <div className="pt-4 border-t border-[var(--line)] mt-4 space-y-2">
              <button 
                onClick={() => {
                  const formattedDate = `${selectedDay.year}-${String(selectedDay.month + 1).padStart(2, '0')}-${String(selectedDay.day).padStart(2, '0')}`;
                  setInitialAddDate(formattedDate);
                  setShowAddEvent(true);
                }}
                className="w-full py-2.5 rounded-xl bg-[#5B8DEF] hover:bg-[#4a72cc] text-white text-sm font-semibold shadow-lg flex items-center justify-center gap-2 transition-all active:scale-[0.98]"
              >
                <I name="plus" size={16}/> Add Event
              </button>
              <button 
                onClick={() => setSelectedDay(null)}
                className="w-full py-2.5 rounded-xl bg-[#1E1B4B]/5 hover:bg-[#1E1B4B]/10 dark:bg-white/5 dark:hover:bg-white/10 text-[#1E1B4B] dark:text-white text-sm font-semibold transition-colors"
              >
                Close
              </button>
            </div>
          </div>
        </div>
      )}

      {showAddEvent && (
        <AddEventModal
          initialDate={initialAddDate}
          onClose={() => setShowAddEvent(false)}
          onSave={(newEvent) => {
            setEvents(prev => [...prev, newEvent]);
            setShowAddEvent(false);
            showToast("Custom event added to calendar!", "success");
          }}
        />
      )}
    </div>
  );
}

// ---------- NOTIFICATIONS ----------
function NotificationsModule({ items, setItems }) {
  const iconMap = { deadline: "alarm-clock", ca: "file-check-2", community: "heart-handshake", material: "book-open" };
  const colorMap = { deadline: "#FF6B5B", ca: "#F4A259", community: "#5B8DEF", material: "#7C9885" };

  return (
    <div className="max-w-2xl">
      <div className="flex justify-end mb-4">
        <button onClick={() => setItems(items.map(n=>({...n,read:true})))} className="text-sm text-[#5B8DEF] font-medium hover:underline">Mark all as read</button>
      </div>
      <div className="space-y-2">
        {items.map((n,i) => (
          <div key={n.id} onClick={() => setItems(items.map(it=>it.id===n.id?{...it,read:true}:it))}
            className={`glass rounded-xl p-4 flex items-start gap-3 cursor-pointer hover:bg-white/80 transition-colors float-in ${!n.read ? "ring-1 ring-[#5B8DEF]/30" : "opacity-60"}`} style={{animationDelay:`${i*40}ms`}}>
            <div className="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" style={{background:`${colorMap[n.type]}1A`, color:colorMap[n.type]}}>
              <I name={iconMap[n.type]} size={16}/>
            </div>
            <div className="flex-1">
              <p className="text-sm text-[#1E1B4B]">{n.text}</p>
              <p className="text-xs text-[#1E1B4B]/40 mt-0.5">{n.time}</p>
            </div>
            <div className="flex flex-col items-end gap-1">
              <span className={`w-2 h-2 rounded-full ${n.priority==='high'?'bg-[#FF6B5B]':n.priority==='medium'?'bg-[#F4A259]':'bg-[#7C9885]'}`}></span>
              {!n.read && <span className="w-2 h-2 rounded-full bg-[#5B8DEF]"></span>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------- SETTINGS ----------
function SettingsModule({ user, setUser, theme, setTheme, onLogout, assignments, cas, notifications, messages, events, pyqUploads, setAssignments, setCas, setNotifications, setMessages, setEvents, setPyqUploads }) {
  const { showToast } = useToast();
  const [form, setForm] = useState({
    name: user.name,
    branch: user.branch,
    year: user.year,
    semester: user.semester,
    className: user.className || "A",
  });

  const [notifPrefs, setNotifPrefs] = usePersistedState("pathway-notif-prefs", {
    deadline: true,
    ca: true,
    community: true,
    announcements: true
  });

  const handleSave = () => {
    if (!form.name.trim() || !form.className.trim()) {
      showToast("Name and Class cannot be empty!", "error");
      return;
    }
    const updatedUser = {
      ...user,
      ...form,
      avatar: getInitials(form.name),
    };
    setUser(updatedUser);
    localStorage.setItem("pathway-user", JSON.stringify(updatedUser));
    showToast("Changes saved successfully!", "success");
  };

  const handleExportData = () => {
    const data = {
      user,
      theme,
      notifPrefs,
      assignments,
      cas,
      notifications,
      messages,
      events,
      pyqUploads
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `Pathway_Data_Export_${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("Data exported successfully!", "success");
  };

  const handleResetData = () => {
    if (window.confirm("Are you sure you want to reset all data? This will clear all items and reload the page.")) {
      const keysToRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith("pathway-")) {
          keysToRemove.push(key);
        }
      }
      keysToRemove.forEach(k => localStorage.removeItem(k));
      showToast("All data reset. Reloading...", "info");
      setTimeout(() => {
        window.location.reload();
      }, 1000);
    }
  };

  return (
    <div className="max-w-xl space-y-6">
      {/* Profile Section */}
      <div className="glass rounded-2xl p-6 shadow-sm">
        <h3 className="font-display font-semibold text-[#1E1B4B] mb-4 flex items-center gap-2"><I name="user" size={18} className="text-[#5B8DEF]"/> Profile Information</h3>
        <div className="flex items-center gap-4 mb-5">
          <div className="w-16 h-16 rounded-full bg-gradient-to-br from-[#5B8DEF] to-[#9B6BFF] flex items-center justify-center font-display font-semibold text-white text-xl">
            {getInitials(form.name) || "?"}
          </div>
          <div>
            <p className="font-medium text-[#1E1B4B]">{user.name}</p>
            <p className="text-sm text-[#1E1B4B]/40">{user.email || "No email linked"}</p>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-4">
          <div>
            <label className="text-xs font-medium text-[#1E1B4B]/40 mb-1.5 block">Full Name</label>
            <input value={form.name} onChange={e=>setForm({...form, name:e.target.value})} className="w-full px-3 py-2 rounded-xl border border-[var(--line)] text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30" />
          </div>
          <div>
            <label className="text-xs font-medium text-[#1E1B4B]/40 mb-1.5 block">Branch / Department</label>
            <input value={form.branch} onChange={e=>setForm({...form, branch:e.target.value})} className="w-full px-3 py-2 rounded-xl border border-[var(--line)] text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30" />
          </div>
          <div>
            <label className="text-xs font-medium text-[#1E1B4B]/40 mb-1.5 block">Academic Year</label>
            <select value={form.year} onChange={e=>setForm({...form, year:e.target.value})} className="w-full px-3 py-2 rounded-xl border border-[var(--line)] text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30">
              <option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option>
            </select>
          </div>
          <div>
            <label className="text-xs font-medium text-[#1E1B4B]/40 mb-1.5 block">Semester</label>
            <select value={form.semester} onChange={e=>setForm({...form, semester:e.target.value})} className="w-full px-3 py-2 rounded-xl border border-[var(--line)] text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30">
              {[1,2,3,4,5,6,7,8].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div className="col-span-2">
            <label className="text-xs font-medium text-[#1E1B4B]/40 mb-1.5 block">Class</label>
            <input value={form.className} onChange={e=>setForm({...form, className:e.target.value})} className="w-full px-3 py-2 rounded-xl border border-[var(--line)] text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30" />
          </div>
        </div>
        <button onClick={handleSave} className="mt-5 px-5 py-2.5 rounded-xl bg-[#1E1B4B] text-white text-sm font-medium hover:bg-[#2a266a] transition-colors">Save Changes</button>
      </div>

      {/* Notification Preferences */}
      <div className="glass rounded-2xl p-6 shadow-sm">

function LevelBadge({ level }) {
  return <span className="text-[10px] font-medium text-[#1E1B4B]/50 whitespace-nowrap">{level}</span>;
}

function CommunityChat({ room, setRoom, messages, setMessages }) {
  const [input, setInput] = useState("");
  const [typing, setTyping] = useState(true);
  const scrollRef = useRef(null);

  const rooms = [
    { id: "general", label: "Global Community", icon: "globe-2" },
    ...SUBJECTS.map(s => ({ id: s.id, label: s.name, icon: s.icon, color: s.color })),
  ];

  const roomMessages = messages.filter(m => m.room === room || (room !== "general" && m.room === "general" && false));

  useEffect(() => {
    scrollRef.current?.scrollTo({ top: scrollRef.current.scrollHeight, behavior: "smooth" });
  }, [messages, room]);

  const send = () => {
    if (!input.trim()) return;
    setMessages([...messages, { id: Date.now(), user: { name: "You", avatar: "ME", color: "#1E1B4B" }, text: input, time: "now", room }]);
    setInput("");
  };

  const currentRoom = rooms.find(r => r.id === room);

  return (
    <div className="flex h-[calc(100vh-220px)] min-h-[480px] glass rounded-2xl overflow-hidden shadow-sm">
      {/* Room list */}
      <div className="w-56 shrink-0 border-r border-[var(--line)] bg-white/40 flex flex-col">
        <div className="p-3 border-b border-[var(--line)]">
          <p className="text-xs font-semibold text-[#1E1B4B]/40 uppercase tracking-wide px-2">Discussion Rooms</p>
        </div>
        <div className="flex-1 overflow-y-auto scrollbar-none p-2 space-y-1">
          {rooms.map(r => (
            <button key={r.id} onClick={() => setRoom(r.id)}
              className={`w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm transition-colors ${room===r.id ? "bg-[#1E1B4B] text-white" : "text-[#1E1B4B]/60 hover:bg-white/80"}`}>
              <I name={r.icon} size={15} />
              <span className="truncate flex-1 text-left">{r.label}</span>
            </button>
          ))}
        </div>
        <div className="p-3 border-t border-[var(--line)]">
          <p className="text-xs font-semibold text-[#1E1B4B]/40 uppercase tracking-wide px-2 mb-2">Online Now</p>
          <div className="space-y-1.5 px-1">
            {ONLINE_STUDENTS.map(s => (
              <div key={s.id} className="flex items-center gap-2">
                <div className="relative">
                  <div className="w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-semibold text-white" style={{background:s.color}}>{s.avatar}</div>
                  <span className={`absolute -bottom-0.5 -right-0.5 w-2 h-2 rounded-full border border-white ${s.status==='online'?'bg-[#7C9885]':'bg-[#1E1B4B]/20'}`}></span>
                </div>
                <span className="text-xs text-[#1E1B4B]/60 truncate">{s.name.split(' ')[0]}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Chat */}
      <div className="flex-1 flex flex-col min-w-0">
        <div className="p-4 border-b border-[var(--line)] flex items-center justify-between bg-white/40">
          <div className="flex items-center gap-2">
            <I name={currentRoom.icon} size={18} style={currentRoom.color ? {color: currentRoom.color} : {}}/>
            <div>
              <p className="font-medium text-[#1E1B4B] text-sm">{currentRoom.label}</p>
              <p className="text-xs text-[#1E1B4B]/40">{ONLINE_STUDENTS.filter(s=>s.status==='online').length} online</p>
            </div>
          </div>
          <I name="search" size={16} className="text-[#1E1B4B]/30"/>
        </div>

        <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-4">
          {roomMessages.length === 0 && (
            <div className="text-center text-sm text-[#1E1B4B]/30 mt-10">No messages yet in this room. Say hi! 👋</div>
          )}
          {roomMessages.map((m,i) => (
            <div key={m.id} className={`flex gap-3 float-in ${m.user.name==='You' ? "flex-row-reverse" : ""}`} style={{animationDelay:`${i*30}ms`}}>
              <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold text-white shrink-0" style={{background:m.user.color}}>{m.user.avatar}</div>
              <div className={`max-w-[75%] ${m.user.name==='You' ? "items-end" : ""} flex flex-col`}>
                <div className={`flex items-center gap-2 mb-1 ${m.user.name==='You' ? "flex-row-reverse" : ""}`}>
                  <span className="text-xs font-medium text-[#1E1B4B]">{m.user.name}</span>
                  <span className="text-[10px] text-[#1E1B4B]/30">{m.time}</span>
                </div>
                <div className={`rounded-2xl px-3.5 py-2.5 text-sm ${m.user.name==='You' ? "bg-[#FF6B5B] text-white rounded-tr-sm" : "bg-white text-[#1E1B4B]/80 rounded-tl-sm"} shadow-sm`}>
                  {m.text.split(' ').map((w,wi) => w.startsWith('@') ? <span key={wi} className={`font-medium ${m.user.name==='You'?'text-white':'text-[#5B8DEF]'}`}>{w} </span> : w + ' ')}

                    <div className="min-w-0">
                      <p className="text-xs font-medium text-[#1E1B4B] truncate">{m.attachment.name}</p>
                      <p className="text-[10px] text-[#1E1B4B]/40">{m.attachment.size}</p>
                    </div>
                  </div>
                )}
                {m.link && (
                  <div className="mt-1.5 bg-white rounded-xl overflow-hidden shadow-sm border border-[var(--line)] max-w-xs">
                    <div className="h-20 bg-[#1E1B4B] flex items-center justify-center"><I name="play-circle" size={24} className="text-white/70"/></div>
                    <div className="p-2"><p className="text-xs font-medium text-[#1E1B4B] truncate">{m.link.title}</p><p className="text-[10px] text-[#1E1B4B]/40">{m.link.url}</p></div>
                  </div>
                )}
                <div className={`flex gap-1 mt-1 ${m.user.name==='You' ? "flex-row-reverse" : ""}`}>
                  {["👍","❤️","😄"].map(e => <span key={e} className="text-xs bg-white/80 rounded-full px-1.5 py-0.5 cursor-pointer hover:scale-110 transition-transform shadow-sm">{e}</span>)}
                </div>
              </div>
            </div>
          ))}
          {typing && (
            <div className="flex items-center gap-2 text-xs text-[#1E1B4B]/40 pl-11">
              <div className="flex gap-0.5">
                <span className="w-1.5 h-1.5 rounded-full bg-[#1E1B4B]/30 animate-bounce" style={{animationDelay:'0ms'}}></span>
                <span className="w-1.5 h-1.5 rounded-full bg-[#1E1B4B]/30 animate-bounce" style={{animationDelay:'150ms'}}></span>
                <span className="w-1.5 h-1.5 rounded-full bg-[#1E1B4B]/30 animate-bounce" style={{animationDelay:'300ms'}}></span>
              </div>
              Rohan Das is typing...
            </div>
          )}
        </div>

        <div className="p-3 border-t border-[var(--line)] bg-white/40">
          <div className="flex items-center gap-2">
            <button className="w-9 h-9 rounded-xl flex items-center justify-center text-[#1E1B4B]/40 hover:bg-white transition-colors shrink-0"><I name="paperclip" size={17}/></button>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}
              placeholder={`Message ${currentRoom.label}... use @ to mention`}
              className="flex-1 px-4 py-2.5 rounded-xl border border-[var(--line)] bg-white text-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B5B]/30" />
            <button className="w-9 h-9 rounded-xl flex items-center justify-center text-[#1E1B4B]/40 hover:bg-white transition-colors shrink-0"><I name="smile" size={17}/></button>
            <button onClick={send} className="w-9 h-9 rounded-xl flex items-center justify-center bg-[#FF6B5B] text-white hover:bg-[#ff5a48] transition-colors shrink-0"><I name="send" size={15}/></button>
          </div>
        </div>
      </div>
    </div>
  );
}

                    <span className="text-sm font-medium text-[#1E1B4B]">{openDoubt.bestAnswer.name}</span>
                    <span className="text-xs bg-[#7C9885] text-white px-2 py-0.5 rounded-full flex items-center gap-1"><I name="trophy" size={10}/> Best Answer</span>

      {/* New doubt modal */}

        <div className="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setShowNewDoubt(false)}>
